name: ImmortalWrt 24.10.5 稳定版（含 Ansuel AN7581）
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with: {path: repo}

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libncurses-dev flex bison gawk git curl python3

      # 官方 ImmortalWrt 24.10.5（已合入 Ansuel 驱动）
      - name: 拉取 ImmortalWrt 官方 v24.10.5
        run: |
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git -b v24.10.5 openwrt

      - name: 复制 .config
        run: |
          cd openwrt
          [ -f ../repo/config/.config ] && cp ../repo/config/.config .config
          make defconfig

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j$(nproc) V=s

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s 2>&1 | tee build.log

      - uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-24.10.5-AN7581
          path: |
            openwrt/bin/targets/airoha/an7581/*.bin
            openwrt/build.log
