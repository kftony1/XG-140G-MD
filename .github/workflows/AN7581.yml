name: Build OpenWrt for AN7581 (Ansuel)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 检出仓库配置
        uses: actions/checkout@v4
        with:
          path: repo

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libncurses-dev flex bison gawk git \
          python3 libelf-dev libssl-dev swig python3-setuptools

      - name: 克隆 Ansuel 的 AN7581 专用源码
        run: |
          git clone --depth=1 -b main-airoha-6.12 https://github.com/Ansuel/openwrt.git openwrt

      - name: 应用 .config 配置文件
        run: |
          cd openwrt
          # 从仓库根目录复制 .config（适配你当前的结构）
          cp ../repo/.config .config
          # 删除废弃的 luci-mod-admin-full 配置项
          sed -i '/CONFIG_PACKAGE_luci-mod-admin-full/d' .config
          make defconfig

      - name: 复制所有自定义文件
        run: |
          cd openwrt
          mkdir -p files/
          # 从仓库根目录的 files 文件夹复制（如果有的话）
          if [ -d ../repo/files ]; then
            cp -r ../repo/files/* files/
          fi
          # 如果 config 目录下有预置文件，也一并复制
          if [ -d ../repo/config ]; then
            cp -r ../repo/config/* files/etc/ 2>/dev/null || true
          fi
          echo "=== 自定义文件列表 ==="
          find files -type f 2>/dev/null | head -20

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 下载源码包
        run: |
          cd openwrt
          make download -j4 V=s

      - name: 开始编译固件
        run: |
          cd openwrt
          make -j1 V=s 2>&1 | tee build.log

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OpenWrt-AN7581-Firmware
          path: |
            openwrt/bin/targets/airoha/an7581/*.bin
            openwrt/build.log
          retention-days: 30
