name: Build OpenWrt for AN7581 (Ansuel)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 检出仓库配置
        uses: actions/checkout@v4
        with:
          path: repo

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libncurses-dev flex bison gawk git \
          python3 libelf-dev libssl-dev swig python3-setuptools

      - name: 克隆 Ansuel 的 AN7581 专用源码
        run: |
          git clone --depth=1 -b main-airoha-6.12 https://github.com/Ansuel/openwrt.git openwrt

      - name: 查看源码支持的 AN7581 设备列表
        run: |
          cd openwrt
          echo "=== 源码中可用的 AN7581 设备配置文件 ==="
          ls -1 target/linux/airoha/an7581/base-files/etc/board.d/ 2>/dev/null || echo "未找到"
          echo ""
          echo "=== 可用的设备树文件 (.dts) ==="
          ls -1 target/linux/airoha/dts/ 2>/dev/null | grep -E "\.dts$" || echo "未找到"

      - name: 应用并自动修正 .config 配置
        run: |
          cd openwrt
          # 复制你的原始配置
          cp ../repo/.config .config
          
          # 删除废弃的包
          sed -i '/CONFIG_PACKAGE_luci-mod-admin-full/d' .config
          
          # 检查源码中实际存在的设备配置名
          DEVICE_NAME=$(grep -o "nokia-xg-040g-md\|evb" .config 2>/dev/null | head -1)
          
          # 如果 .config 中指定了 nokia-xg-040g-md，但源码中不存在，则回退到通用配置
          if ! grep -q "CONFIG_TARGET_DEVICE_airoha_an7581_nokia-xg-040g-md=y" target/linux/airoha/an7581/target.mk 2>/dev/null; then
            echo "⚠️ 警告：源码中未找到 nokia-xg-040g-md 设备配置，将使用通用 AN7581 配置"
            sed -i 's/CONFIG_TARGET_DEVICE_airoha_an7581_nokia-xg-040g-md=y/# CONFIG_TARGET_DEVICE_airoha_an7581_nokia-xg-040g-md is not set/g' .config
            echo "CONFIG_TARGET_DEVICE_airoha_an7581_evb=y" >> .config
          fi
          
          make defconfig

      - name: 复制所有自定义文件
        run: |
          cd openwrt
          mkdir -p files/
          if [ -d ../repo/files ]; then
            cp -r ../repo/files/* files/
          fi
          if [ -d ../repo/config ]; then
            cp -r ../repo/config/* files/etc/ 2>/dev/null || true
          fi
          echo "=== 自定义文件列表 ==="
          find files -type f 2>/dev/null | head -20

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 下载源码包
        run: |
          cd openwrt
          make download -j4 V=s

      - name: 开始编译固件
        run: |
          cd openwrt
          make -j1 V=s 2>&1 | tee build.log

      - name: 显示生成的固件信息
        run: |
          cd openwrt
          echo "=== 生成的固件文件 ==="
          find bin/targets/airoha/an7581/ -type f -name "*.bin" -exec ls -lh {} \; 2>/dev/null || echo "未找到固件文件"

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OpenWrt-AN7581-Firmware
          path: |
            openwrt/bin/targets/airoha/an7581/*.bin
            openwrt/build.log
          retention-days: 30
