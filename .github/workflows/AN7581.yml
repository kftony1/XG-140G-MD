name: Build OpenWrt for AN7581 (Nokia Valyrian)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 检出仓库配置
        uses: actions/checkout@v4
        with:
          path: repo

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libncurses-dev flex bison gawk git \
          python3 libelf-dev libssl-dev swig python3-setuptools

      - name: 克隆 Ansuel 的 AN7581 专用源码
        run: |
          git clone --depth=1 -b main-airoha-6.12 https://github.com/Ansuel/openwrt.git openwrt

      - name: 应用并修正 .config 配置
        run: |
          cd openwrt
          
          # 从仓库根目录复制 .config
          cp ../repo/.config .config
          
          echo "=== 原始设备配置 ==="
          grep -E "CONFIG_TARGET_DEVICE|CONFIG_TARGET_BOARD" .config || echo "⚠️ 未找到原始设备配置"
          
          # 删除废弃包
          sed -i '/CONFIG_PACKAGE_luci-mod-admin-full/d' .config
          
          # 修正设备配置
          sed -i 's/^CONFIG_TARGET_DEVICE_airoha_an7581.*/CONFIG_TARGET_DEVICE_airoha_an7581_nokia-valyrian=y/' .config
          sed -i 's/^CONFIG_TARGET_DEVICE_PACKAGES_airoha_an7581.*/CONFIG_TARGET_DEVICE_PACKAGES_airoha_an7581_nokia-valyrian=""/' .config
          sed -i 's/^CONFIG_TARGET_BOARD=.*/CONFIG_TARGET_BOARD="an7581"/' .config
          
          echo ""
          echo "=== 修正后的设备配置 ==="
          grep -E "CONFIG_TARGET_DEVICE|CONFIG_TARGET_BOARD" .config
          
          # 强制开启生成 squashfs-factory.bin（关键配置）
          echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_INITRAMFS=n" >> .config
          echo "CONFIG_TARGET_ROOTFS_FACTORY=y" >> .config
          
          make defconfig
          
          echo ""
          echo "=== defconfig 后的设备配置 ==="
          grep -E "CONFIG_TARGET_DEVICE|CONFIG_TARGET_BOARD" .config || echo "❌ 设备配置已丢失"
          
          # 自动回退到 EVB
          if ! grep -q "CONFIG_TARGET_DEVICE_airoha_an7581_" .config; then
            echo "⚠️ 回退到 EVB 通用配置"
            echo "CONFIG_TARGET_DEVICE_airoha_an7581_evb=y" >> .config
            echo "CONFIG_TARGET_DEVICE_PACKAGES_airoha_an7581_evb=\"\"" >> .config
            make defconfig
          fi

      - name: 复制所有自定义文件
        run: |
          cd openwrt
          mkdir -p files/
          if [ -d ../repo/files ]; then
            cp -r ../repo/files/* files/
          fi
          if [ -d ../repo/config ]; then
            cp -r ../repo/config/* files/etc/ 2>/dev/null || true
          fi
          echo "=== 自定义文件列表 ==="
          find files -type f 2>/dev/null | head -20

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 下载源码包
        run: |
          cd openwrt
          make download -j4 V=s

      - name: 开始编译固件
        run: |
          cd openwrt
          make -j1 V=s 2>&1 | tee build.log

      - name: 显示生成的固件信息
        run: |
          cd openwrt
          echo "=== 生成的固件文件 ==="
          find bin/targets/airoha/an7581/ -type f -name "*.bin" -exec ls -lh {} \; 2>/dev/null || echo "❌ 未找到固件文件"

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OpenWrt-AN7581-Firmware
          path: |
            openwrt/bin/targets/airoha/an7581/*squashfs-sysupgrade.bin
            openwrt/bin/targets/airoha/an7581/*squashfs-factory.bin
            openwrt/build.log
          retention-days: 30
