name: ImmortalWrt 24.10 开发版 AN7581
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 检出配置
        uses: actions/checkout@v4
        with:
          path: repo

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libncurses-dev flex bison gawk git python3

      - name: 拉取官方开发版
        run: |
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git -b main openwrt

      - name: 应用配置
        run: |
          cd openwrt
          cp ../repo/config/.config .config
          make defconfig

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 下载依赖
        run: cd openwrt && make download -j4 V=s

      - name: 编译（单线程避免报错）
        run: cd openwrt && make -j1 V=s 2>&1 | tee build.log

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: AN7581-Firmware
          path: |
            openwrt/bin/targets/airoha/an7581/*.bin
            openwrt/build.log
