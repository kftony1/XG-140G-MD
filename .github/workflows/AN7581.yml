name: Ansuel OpenWrt - AN7581 完整固件（含自定义文件）
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 检出仓库所有配置（含 .config + files）
        uses: actions/checkout@v4
        with:
          path: repo

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libncurses-dev flex bison gawk git python3 libelf-dev libssl-dev

      - name: 拉取 Ansuel 官方 OpenWrt 仓库
        run: |
          git clone --depth=1 https://github.com/Ansuel/openwrt.git openwrt

      - name: 应用 .config 配置
        run: |
          cd openwrt
          cp ../repo/config/.config .config
          make defconfig

      - name: 复制所有自定义文件（network / shadow / 全部）
        run: |
          cd openwrt
          mkdir -p files/
          cp -r ../repo/files/* files/
          ls -la files/

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j4 V=s

      - name: 单线程编译（防 Error 255）
        run: |
          cd openwrt
          make -j1 V=s 2>&1 | tee build.log

      - name: 上传固件 + 日志
        uses: actions/upload-artifact@v4
        with:
          name: Ansuel-AN7581-完整固件
          path: |
            openwrt/bin/targets/airoha/an7581/*.bin
            openwrt/build.log
          retention-days: 30
