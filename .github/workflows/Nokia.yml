name: Build ImmortalWrt for Nokia XG-140G-MD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build environment setup
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
            file wget subversion patch upx-ucl perl findutils

      - name: Clone ImmortalWrt
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git immortalwrt

      - name: Copy .config to ImmortalWrt
        run: |
          cp config/.config immortalwrt/.config

      - name: Create files directory structure
        run: |
          # 创建 ImmortalWrt 的 files 目录（用于覆盖默认配置）
          mkdir -p immortalwrt/files/etc/config
          mkdir -p immortalwrt/files/etc

      - name: Copy custom config files
        run: |
          # 复制网络配置
          if [ -f "etc/config/network" ]; then
            cp etc/config/network immortalwrt/files/etc/config/
            echo "✅ Copied network config"
          else
            echo "⚠️ etc/config/network not found"
          fi
          
          # 复制密码配置
          if [ -f "etc/config/shadow" ]; then
            cp etc/config/shadow immortalwrt/files/etc/config/
            echo "✅ Copied shadow config"
          else
            echo "⚠️ etc/config/shadow not found"
          fi
          
          # 复制网络脚本
          if [ -f "network" ]; then
            cp network immortalwrt/files/etc/
            echo "✅ Copied network script"
          else
            echo "⚠️ network script not found"
          fi

      - name: Verify files copied
        run: |
          echo "=== Files in immortalwrt/files ==="
          find immortalwrt/files -type f 2>/dev/null || echo "No files copied"

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache ImmortalWrt downloads
        uses: actions/cache@v4
        with:
          path: immortalwrt/dl
          key: ${{ runner.os }}-dl-${{ hashFiles('immortalwrt/feeds.conf', 'immortalwrt/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-dl-

      - name: Download package sources
        run: |
          cd immortalwrt
          make download -j8

      - name: Validate configuration
        run: |
          cd immortalwrt
          make defconfig

      - name: Build firmware
        timeout-minutes: 120
        run: |
          cd immortalwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-XG-140G-MD-${{ github.run_number }}-${{ github.sha }}
          path: |
            immortalwrt/bin/targets/airoha/an7581/*.sysupgrade.bin
            immortalwrt/bin/targets/airoha/an7581/*.factory.bin
          retention-days: 30

      - name: Upload build logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            immortalwrt/logs/
            immortalwrt/.config
          retention-days: 7
