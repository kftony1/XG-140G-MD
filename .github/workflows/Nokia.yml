name: Build ImmortalWrt for Nokia XG-140G-MD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build environment setup
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
            file wget subversion patch upx-ucl perl findutils

      - name: Clone ImmortalWrt
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git immortalwrt

      - name: Copy .config to ImmortalWrt
        run: |
          cp config/.config immortalwrt/.config

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache ImmortalWrt downloads
        uses: actions/cache@v4
        with:
          path: immortalwrt/dl
          key: ${{ runner.os }}-dl-${{ hashFiles('immortalwrt/feeds.conf', 'immortalwrt/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-dl-

      - name: Download package sources
        run: |
          cd immortalwrt
          make download -j8

      - name: Debug - Check directory structure
        run: |
          echo "=== Check immortalwrt directory ==="
          ls -la immortalwrt/
          echo "=== Check package directory ==="
          ls -la immortalwrt/package/ 2>/dev/null || echo "package directory not found"
          echo "=== Check base-files directory ==="
          ls -la immortalwrt/package/base-files/ 2>/dev/null || echo "base-files directory not found"
          echo "=== Current user ==="
          whoami
          echo "=== Disk space ==="
          df -h

      - name: Copy custom config files
        run: |
          # 检查目录是否存在
          if [ ! -d "immortalwrt/package/base-files" ]; then
            echo "ERROR: base-files directory not found!"
            exit 1
          fi
          
          # 创建目录
          mkdir -p immortalwrt/package/base-files/files/etc/config
          
          # 复制自定义配置文件
          if [ -f "etc/config/network" ]; then
            cp etc/config/network immortalwrt/package/base-files/files/etc/config/
            echo "✅ Copied network config"
          fi
          
          if [ -f "etc/config/shadow" ]; then
            cp etc/config/shadow immortalwrt/package/base-files/files/etc/config/
            echo "✅ Copied shadow config"
          fi
          
          if [ -f "network" ]; then
            cp network immortalwrt/package/base-files/files/etc/
            echo "✅ Copied network script"
          fi

      - name: Validate configuration
        run: |
          cd immortalwrt
          make defconfig

      - name: Build firmware
        timeout-minutes: 120
        run: |
          cd immortalwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-XG-140G-MD-${{ github.run_number }}-${{ github.sha }}
          path: |
            immortalwrt/bin/targets/airoha/an7581/*.sysupgrade.bin
            immortalwrt/bin/targets/airoha/an7581/*.factory.bin
          retention-days: 30

      - name: Upload build logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            immortalwrt/logs/
            immortalwrt/.config
          retention-days: 7
