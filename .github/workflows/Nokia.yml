name: Build OpenWrt for Nokia XG-140G-MD

on:
  push:
    branches:
      - main
      - develop
      - master
      - release
      - staging
      - production
    paths:
      - 'config/.config'
      - '.github/workflows/Nokia.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: DEBUG - List all files
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Full file list ==="
          ls -la
          echo "=== config directory ==="
          ls -la config/ || echo "config/ not found"
          echo "=== Find .config anywhere ==="
          find . -name ".config" -type f
          echo "=== Find config files ==="
          find . -name "*.config" -type f

      - name: Build environment setup
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
            file wget subversion patch upx-ucl perl findutils

      - name: Clone OpenWrt
        run: |
          git clone https://git.openwrt.org/openwrt/openwrt.git openwrt

      - name: Copy .config to OpenWrt
        run: |
          echo "=== Current directory before copy ==="
          pwd
          ls -la
          
          # 尝试多种可能的路径
          if [ -f "config/.config" ]; then
            echo "Found config/.config"
            cp config/.config openwrt/.config
          elif [ -f ".config" ]; then
            echo "Found .config in root"
            cp .config openwrt/.config
          elif [ -f "../config/.config" ]; then
            echo "Found ../config/.config"
            cp ../config/.config openwrt/.config
          else
            echo "ERROR: .config file not found!"
            echo "Searching in parent directory..."
            find .. -name ".config" -type f 2>/dev/null || echo "No .config found"
            exit 1
          fi
          
          echo "=== Verify copy ==="
          ls -la openwrt/.config

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache OpenWrt downloads
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ hashFiles('openwrt/feeds.conf', 'openwrt/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-dl-

      - name: Download package sources
        run: |
          cd openwrt
          make download -j8

      - name: Validate configuration
        run: |
          cd openwrt
          make defconfig

      - name: Build firmware
        timeout-minutes: 120
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XG-140G-MD-${{ github.run_number }}-${{ github.sha }}
          path: |
            openwrt/bin/targets/airoha/an7581/*.sysupgrade.bin
            openwrt/bin/targets/airoha/an7581/*.factory.bin
          retention-days: 30

      - name: Upload build logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: openwrt/logs/
          retention-days: 7
