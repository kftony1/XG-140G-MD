name: Build ImmortalWrt for Nokia XG-140G-MD

on:
  push:
    branches:
      - main
      - develop
      - master
      - release
      - staging
      - production
    paths:
      - 'config/.config'
      - '.github/workflows/Nokia.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build environment setup
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
            file wget subversion patch upx-ucl perl findutils

      - name: Clone ImmortalWrt
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git immortalwrt

      - name: Copy .config to ImmortalWrt
        run: |
          cp config/.config immortalwrt/.config

      - name: Copy custom config files
        run: |
          mkdir -p immortalwrt/package/base-files/files/etc/config
          [ -f "etc/config/network" ] && cp etc/config/network immortalwrt/package/base-files/files/etc/config/
          [ -f "etc/config/shadow" ] && cp etc/config/shadow immortalwrt/package/base-files/files/etc/config/
          [ -f "network" ] && cp network immortalwrt/package/base-files/files/etc/

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache ImmortalWrt downloads
        uses: actions/cache@v4
        with:
          path: immortalwrt/dl
          key: ${{ runner.os }}-dl-${{ hashFiles('immortalwrt/feeds.conf', 'immortalwrt/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-dl-

      - name: Download package sources
        run: |
          cd immortalwrt
          make download -j8

      - name: Validate configuration
        run: |
          cd immortalwrt
          make defconfig

      - name: Build firmware
        timeout-minutes: 120
        run: |
          cd immortalwrt
          make -j$(nproc) || make -j1 V=s

      - name: Prepare logs directory
        if: always()
        run: |
          cd immortalwrt
          mkdir -p logs

      - name: Get firmware name
        run: |
          cd immortalwrt
          FIRMWARE_DIR="bin/targets/airoha/an7581"
          if [ -d "$FIRMWARE_DIR" ]; then
            FIRMWARE=$(ls $FIRMWARE_DIR | grep -E 'sysupgrade\.bin$|factory\.bin$' | head -1)
            if [ -n "$FIRMWARE" ]; then
              echo "FIRMWARE=$FIRMWARE" >> $GITHUB_ENV
              echo "FIRMWARE_PATH=$FIRMWARE_DIR/$FIRMWARE" >> $GITHUB_ENV
              echo "Found firmware: $FIRMWARE"
            fi
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-XG-140G-MD-${{ github.run_number }}-${{ github.sha }}
          path: |
            immortalwrt/bin/targets/airoha/an7581/*.sysupgrade.bin
            immortalwrt/bin/targets/airoha/an7581/*.factory.bin
            immortalwrt/bin/targets/airoha/an7581/*.bin
            immortalwrt/bin/targets/airoha/an7581/*.manifest
          retention-days: 30

      - name: Generate download summary
        if: success()
        run: |
          echo "## 📦 ImmortalWrt 固件下载" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 固件类型 | 文件名 | 大小 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|------|" >> $GITHUB_STEP_SUMMARY
          
          cd immortalwrt/bin/targets/airoha/an7581/ 2>/dev/null || exit 0
          
          for file in *.sysupgrade.bin *.factory.bin; do
            if [ -f "$file" ]; then
              SIZE=$(du -h "$file" | cut -f1)
              echo "| sysupgrade | \`$file\` | $SIZE |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 下载链接" >> $GITHUB_STEP_SUMMARY
          echo "- [📁 点击下载固件](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)" >> $GITHUB_STEP_SUMMARY

      - name: Upload build logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            immortalwrt/logs/
            immortalwrt/.config
          retention-days: 7
