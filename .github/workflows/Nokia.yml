name: Build OpenWrt for Nokia XG-140G-MD

on:
  push:
    branches:
      - main
      - develop
      - master
      - release
      - staging
      - production
    paths:
      - 'config/.config'
      - '.github/workflows/NOKIA.yml'
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Trigger source'
        required: false
        default: 'manual'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build environment setup
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
            file wget subversion patch upx-ucl perl findutils

      - name: Clone OpenWrt
        run: |
          git clone https://git.openwrt.org/openwrt/openwrt.git openwrt

      - name: Copy .config to OpenWrt
        run: |
          # 从仓库的 config/ 目录复制 .config 到 OpenWrt 根目录
          cp config/.config openwrt/.config

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache OpenWrt downloads
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ hashFiles('openwrt/feeds.conf', 'openwrt/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-dl-

      - name: Download package sources
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;

      - name: Validate configuration
        run: |
          cd openwrt
          make defconfig
          ./scripts/diffconfig.sh > config.diff
          if [ -s config.diff ]; then
            echo "Configuration changes detected:"
            cat config.diff
          fi

      - name: Build firmware
        timeout-minutes: 120
        run: |
          cd openwrt
          make clean
          make -j$(nproc) || make -j1 V=s

      - name: Prepare logs directory
        if: always()
        run: |
          cd openwrt
          mkdir -p logs

      - name: Get firmware name
        run: |
          cd openwrt
          FIRMWARE_DIR="bin/targets/airoha/an7581"
          if [ -d "$FIRMWARE_DIR" ]; then
            FIRMWARE=$(ls $FIRMWARE_DIR | grep -E 'sysupgrade\.bin$|factory\.bin$' | head -1)
            if [ -n "$FIRMWARE" ]; then
              echo "FIRMWARE=$FIRMWARE" >> $GITHUB_ENV
              echo "FIRMWARE_PATH=$FIRMWARE_DIR/$FIRMWARE" >> $GITHUB_ENV
              echo "FIRMWARE_DIR=$FIRMWARE_DIR" >> $GITHUB_ENV
              echo "Found firmware: $FIRMWARE"
            else
              echo "No firmware found, listing directory:"
              ls -la $FIRMWARE_DIR
            fi
          else
            echo "Firmware directory not found: $FIRMWARE_DIR"
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XG-140G-MD-${{ github.run_number }}-${{ github.sha }}
          path: |
            openwrt/bin/targets/airoha/an7581/*.sysupgrade.bin
            openwrt/bin/targets/airoha/an7581/*.factory.bin
            openwrt/bin/targets/airoha/an7581/*.bin
            openwrt/bin/targets/airoha/an7581/*.img
            openwrt/bin/targets/airoha/an7581/*.tar
            openwrt/bin/targets/airoha/an7581/*.manifest
          retention-days: 30

      - name: Generate download summary
        if: success()
        run: |
          echo "## 📦 固件下载" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 固件类型 | 文件名 | 大小 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|------|" >> $GITHUB_STEP_SUMMARY
          
          cd openwrt/bin/targets/airoha/an7581/ 2>/dev/null || { echo "No firmware directory found"; exit 0; }
          
          for file in *.sysupgrade.bin *.factory.bin *.bin *.img *.tar; do
            if [ -f "$file" ]; then
              SIZE=$(du -h "$file" | cut -f1)
              echo "| sysupgrade | \`$file\` | $SIZE |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 快速访问" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [📁 查看所有产物](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [⬇️ 下载固件](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ 刷机提示" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. 确认设备型号为 Nokia XG-140G-MD" >> $GITHUB_STEP_SUMMARY
          echo "2. 刷机前请备份原始固件" >> $GITHUB_STEP_SUMMARY
          echo "3. 推荐通过 WEB 界面或 U-Boot 刷入" >> $GITHUB_STEP_SUMMARY

      - name: Upload build logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            openwrt/logs/
            openwrt/.config
            openwrt/config.diff
          retention-days: 7

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            openwrt/bin/targets/airoha/an7581/*.sysupgrade.bin
            openwrt/bin/targets/airoha/an7581/*.factory.bin
          generate_release_notes: true
          name: "Nokia XG-140G-MD ${{ github.ref_name }}"
          body: |
            ## Nokia XG-140G-MD OpenWrt 固件
            
            ### 📦 固件信息
            - 构建时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
            - 运行编号: ${{ github.run_number }}
            - 提交哈希: ${{ github.sha }}
            
            ### 📥 下载说明
            点击下方 Assets 下载固件文件
            
            ### ⚠️ 注意事项
            - 请确保设备型号为 Nokia XG-140G-MD
            - 刷机前请备份原始固件
            - 建议通过 WEB 界面或 U-Boot 刷入
