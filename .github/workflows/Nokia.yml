name: Build ImmortalWrt（修复版）
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安全下载缓存
        uses: actions/cache@v4
        with:
          path: immortalwrt/dl
          key: ${{ runner.os }}-dl-${{ github.sha }}
          restore-keys: ${{ runner.os }}-dl-

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libncurses5-dev gawk git libssl-dev gettext unzip zlib1g-dev ccache flex bison python3 libelf-dev

      - name: 清理旧环境
        run: sudo rm -rf immortalwrt/

      - name: 拉取 ImmortalWrt 源码
        run: git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git immortalwrt

      - name: 使用你仓库的完整驱动（修复：不删除原版平台）
        run: |
          cd immortalwrt
          unzip -o ../airoha.zip -d target/linux/

      - name: 更新 feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: 写入网络配置
        run: |
          mkdir -p immortalwrt/files/etc/config
          cat <<'EOF' > immortalwrt/files/etc/config/network
config interface 'loopback'
    option ifname 'lo'
    option proto 'static'
    option ipaddr '127.0.0.1'
    option netmask '255.0.0.0'

config interface 'lan'
    option ifname 'eth0'
    option proto 'static'
    option ipaddr '192.168.1.1'
    option netmask '255.255.255.0'
    option ip6assign '60'

config interface 'wan'
    option ifname 'eth1'
    option proto 'dhcp'

config interface 'wan6'
    option ifname 'eth1'
    option proto 'dhcpv6'
EOF

      - name: 写入登录密码
        run: |
          mkdir -p immortalwrt/files/etc
          cat <<'EOF' > immortalwrt/files/etc/passwd
root:$1$WnUqCk5R$CvC8R.pJH5tT9qkO7xN5d/:0:0:99999:7:::
daemon:*:0:0:99999:7:::
ftp:*:0:0:99999:7:::
nobody:*:0:0:99999:7:::
EOF

      - name: 使用你的 .config
        run: cp -f config/.config immortalwrt/.config

      - name: 生成配置
        run: |
          cd immortalwrt
          make defconfig

      - name: 下载依赖
        run: |
          cd immortalwrt
          make download -j$(nproc)

      - name: 开始编译（修复：单线程编译，避免小众平台失败）
        run: |
          cd immortalwrt
          make -j1 V=s

      - name: 查看固件目录
        run: ls -lh immortalwrt/bin/targets/airoha/*/

      - name: 上传固件（修复：通配符路径）
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-XG-140G-MD
          path: immortalwrt/bin/targets/**/*
          if-no-files-found: error
