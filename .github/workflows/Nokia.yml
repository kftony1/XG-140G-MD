name: Build ImmortalWrt
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: Enable cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            immortalwrt/dl
            immortalwrt/feeds
          key: ${{ runner.os }}-immortalwrt-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-immortalwrt-

      - name: Clone source code
        run: git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git immortalwrt

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ==============================================
      # 核心：强制使用 你仓库根目录 /config/.config
      # ==============================================
      - name: Apply YOUR config from repo
        run: |
          ls -la config/
          cp -f config/.config immortalwrt/.config
          
      - name: Create network config
        run: |
          mkdir -p immortalwrt/files/etc/config
          printf "config interface 'loopback'\n    option ifname 'lo'\n    option proto 'static'\n    option ipaddr '127.0.0.1'\n    option netmask '255.0.0.0'\n\nconfig interface 'lan'\n    option ifname 'eth0'\n    option proto 'static'\n    option ipaddr '192.168.1.1'\n    option netmask '255.255.255.0'\n    option ip6assign '60'\n\nconfig interface 'wan'\n    option ifname 'eth1'\n    option proto 'dhcp'\n\nconfig interface 'wan6'\n    option ifname 'eth1'\n    option proto 'dhcpv6'\n" > immortalwrt/files/etc/config/network

      - name: Create passwd file
        run: |
          mkdir -p immortalwrt/files/etc
          printf "root:\$1\$WnUqCk5R\$CvC8R.pJH5tT9qkO7xN5d/:0:0:99999:7:::\ndaemon:*:0:0:99999:7:::\nftp:*:0:0:99999:7:::\nnobody:*:0:0:99999:7:::\n" > immortalwrt/files/etc/passwd

      - name: Generate config
        run: |
          cd immortalwrt
          make defconfig

      - name: Compile firmware
        id: compile
        run: |
          cd immortalwrt
          make -j$(nproc) V=s 2>&1 | tee build.log
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Prepare firmware
        if: steps.compile.outputs.status == 'success'
        run: |
          mkdir -p firmware
          find immortalwrt/bin/targets/ -type f -name "*immortalwrt*" -exec mv {} firmware/ \;
          echo "<h1>Build Success</h1>" > firmware/index.html
          for f in firmware/*; do
            if [ -f "$f" ] && [[ ! $f == *.html ]]; then
              name=$(basename "$f")
              echo "<a href='$name'>Download $name</a><br>" >> firmware/index.html
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-Firmware
          path: firmware/
