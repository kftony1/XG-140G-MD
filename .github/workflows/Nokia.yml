name: Build OpenWrt for Nokia XG-140G-MD

on:
  push:
    branches:
      - main
      - develop
      - master
      - release
      - staging
      - production
    paths:
      - 'config/.config'
      - '.github/workflows/Nokia.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build environment setup
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
            file wget subversion patch upx-ucl perl findutils

      - name: Clone OpenWrt
        run: |
          git clone https://git.openwrt.org/openwrt/openwrt.git openwrt

      - name: Copy .config to OpenWrt
        run: |
          # 从仓库的 config/ 目录复制 .config 到 OpenWrt 根目录
          cp config/.config openwrt/.config

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache OpenWrt downloads
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ hashFiles('openwrt/feeds.conf', 'openwrt/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-dl-

      - name: Download package sources
        run: |
          cd openwrt
          make download -j8

      - name: Validate configuration
        run: |
          cd openwrt
          make defconfig

      - name: Build firmware
        timeout-minutes: 120
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Prepare logs directory
        if: always()
        run: |
          cd openwrt
          mkdir -p logs

      - name: Get firmware name
        run: |
          cd openwrt
          FIRMWARE_DIR="bin/targets/airoha/an7581"
          if [ -d "$FIRMWARE_DIR" ]; then
            FIRMWARE=$(ls $FIRMWARE_DIR | grep -E 'sysupgrade\.bin$|factory\.bin$' | head -1)
            if [ -n "$FIRMWARE" ]; then
              echo "FIRMWARE=$FIRMWARE" >> $GITHUB_ENV
              echo "FIRMWARE_PATH=$FIRMWARE_DIR/$FIRMWARE" >> $GITHUB_ENV
              echo "Found firmware: $FIRMWARE"
            else
              echo "No firmware found"
              ls -la $FIRMWARE_DIR
            fi
          else
            echo "Firmware directory not found"
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XG-140G-MD-${{ github.run_number }}-${{ github.sha }}
          path: |
            openwrt/bin/targets/airoha/an7581/*.sysupgrade.bin
            openwrt/bin/targets/airoha/an7581/*.factory.bin
            openwrt/bin/targets/airoha/an7581/*.bin
            openwrt/bin/targets/airoha/an7581/*.manifest
          retention-days: 30

      - name: Generate download summary
        if: success()
        run: |
          echo "## 📦 固件下载" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 固件类型 | 文件名 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          cd openwrt/bin/targets/airoha/an7581/ 2>/dev/null || exit 0
          
          for file in *.sysupgrade.bin *.factory.bin; do
            if [ -f "$file" ]; then
              echo "| sysupgrade | \`$file\` |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 下载链接" >> $GITHUB_STEP_SUMMARY
          echo "- [📁 查看所有产物](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)" >> $GITHUB_STEP_SUMMARY

      - name: Upload build logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            openwrt/logs/
            openwrt/.config
          retention-days: 7
