name: Build ImmortalWrt
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libncurses5-dev gawk git libssl-dev gettext unzip zlib1g-dev ccache

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            immortalwrt/dl
            immortalwrt/feeds
          key: ${{ runner.os }}-immortalwrt-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-immortalwrt-

      - name: Clone Source
        run: git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git immortalwrt

      - name: Update Feeds
        run: |
          cd immortalwrt
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Use Your .config
        run: |
          cp -f config/.config immortalwrt/.config

      - name: Write Network
        run: |
          mkdir -p immortalwrt/files/etc/config
          cat <<'EOF' > immortalwrt/files/etc/config/network
config interface 'loopback'
    option ifname 'lo'
    option proto 'static'
    option ipaddr '127.0.0.1'
    option netmask '255.0.0.0'

config interface 'lan'
    option ifname 'eth0'
    option proto 'static'
    option ipaddr '192.168.1.1'
    option netmask '255.255.255.0'
    option ip6assign '60'

config interface 'wan'
    option ifname 'eth1'
    option proto 'dhcp'

config interface 'wan6'
    option ifname 'eth1'
    option proto 'dhcpv6'
EOF

      - name: Write Passwd
        run: |
          mkdir -p immortalwrt/files/etc
          cat <<'EOF' > immortalwrt/files/etc/passwd
root:$1$WnUqCk5R$CvC8R.pJH5tT9qkO7xN5d/:0:0:99999:7:::
daemon:*:0:0:99999:7:::
ftp:*:0:0:99999:7:::
nobody:*:0:0:99999:7:::
EOF

      - name: Defconfig
        run: |
          cd immortalwrt
          make defconfig

      - name: Compile
        id: compile
        run: |
          cd immortalwrt
          make -j$(nproc) V=s >> build.log 2>&1
          tail -50 build.log
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload Log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: immortalwrt/build.log

      - name: Package Firmware
        if: steps.compile.outputs.status == 'success'
        run: |
          mkdir -p firmware
          find immortalwrt/bin/targets/ -name "*immortalwrt*" -type f -exec mv {} firmware/ \;
          cat > firmware/index.html <<EOF
<!DOCTYPE html>
<center style="padding:40px">
<h1>✅ Build Success</h1>
<p>IP: 192.168.1.1</p>
<p>User: root</p>
EOF
          for f in firmware/*; do
            if [ -f "$f" ] && [[ "$f" != *.html ]];then
              n=$(basename "$f")
              echo "<a href='$n' style='display:block;padding:10px;background:#07c;color:#fff;margin:5px'>Download $n</a>" >> firmware/index.html
            fi
          done
          echo "</center>" >> firmware/index.html

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-Firmware
          path: firmware/
