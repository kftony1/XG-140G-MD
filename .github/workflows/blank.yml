name: Build with OpenWrt SDK Docker

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: openwrt/sdk:airoha-an7581-openwrt-24.10
    steps:
      - name: Checkout custom config and files
        uses: actions/checkout@v4

      - name: Copy files into SDK
        run: |
          cp .config openwrt/.config
          cp -r files openwrt/
          cd openwrt
          make defconfig
          make download -j$(nproc)
          make -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/airoha/an7581/
