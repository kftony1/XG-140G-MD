# ... (工作流文件开头部分保持不变) ...
      - name: Download OpenWrt ImageBuilder
        run: |
          # 修正点 1：将链接中的版本号从 "24.10.0" 改为 "24.10"
          wget https://downloads.openwrt.org/releases/24.10/targets/airoha/an7581/openwrt-imagebuilder-24.10-airoha-an7581.Linux-x86_64.tar.xz
          tar -xf openwrt-imagebuilder-*.tar.xz
          rm openwrt-imagebuilder-*.tar.xz
          mv openwrt-imagebuilder-* imagebuilder

# ... (中间步骤保持不变) ...
      - name: Build firmware image
        working-directory: imagebuilder
        run: |
          # 修正点 2：将 PROFILE 从 "nokia_xg-040g-md" 改为 "nokia-xg-040g-md"
          make image PROFILE="nokia-xg-040g-md" \
            PACKAGES="luci luci-ssl luci-i18n-base-zh-cn kmod-usb3 kmod-usb-dwc3 kmod-phy-airoha-en8811h airoha-en8811h-firmware kmod-wdt-en7581" \
            FILES=files/
