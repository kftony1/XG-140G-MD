name: Build ImmortalWrt for Nokia XG-140G-MD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build environment setup
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
            file wget subversion patch upx-ucl perl findutils

      - name: Clone ImmortalWrt
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git immortalwrt

      - name: Copy .config to ImmortalWrt
        run: |
          cp config/.config immortalwrt/.config

      - name: Create network config file
        run: |
          mkdir -p immortalwrt/files/etc/config
          cat > immortalwrt/files/etc/config/network << 'EOF'
config interface 'loopback'
    option ifname 'lo'
    option proto 'static'
    option ipaddr '127.0.0.1'
    option netmask '255.0.0.0'

config interface 'lan'
    option ifname 'eth0'
    option proto 'static'
    option ipaddr '192.168.1.1'
    option netmask '255.255.255.0'
    option ip6assign '60'

config interface 'wan'
    option ifname 'eth1'
    option proto 'dhcp'

config interface 'wan6'
    option ifname 'eth1'
    option proto 'dhcpv6'
EOF

      - name: Create shadow file
        run: |
          mkdir -p immortalwrt/files/etc/config
          cat > immortalwrt/files/etc/config/shadow << 'EOF'
root:$1$WnUqCk5R$CvC8R.pJH5tT9qkO7xN5d/:0:0:99999:7:::
daemon:*:0:0:99999:7:::
ftp:*:0:0:99999:7:::
nobody:*:0:0:99999:7:::
EOF

      - name: Create network script
        run: |
          mkdir -p immortalwrt/files/etc
          cat > immortalwrt/files/etc/network << 'EOF'
#!/bin/sh
ifup -a
EOF
          chmod +x immortalwrt/files/etc/network

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache ImmortalWrt downloads
        uses: actions/cache@v4
        with:
          path: immortalwrt/dl
          key: ${{ runner.os }}-dl-${{ hashFiles('immortalwrt/feeds.conf', 'immortalwrt/feeds.conf.default') }}
          restore-keys:
            - ${{ runner.os }}-dl-

      - name: Download package sources
        run: |
          cd immortalwrt
          make download -j8

      - name: Validate configuration
        run: |
          cd immortalwrt
          make defconfig

      - name: Build firmware
        timeout-minutes: 120
        run: |
          cd immortalwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-XG-140G-MD-${{ github.run_number }}-${{ github.sha }}
          path:
            - immortalwrt/bin/targets/airoha/an7581/*.sysupgrade.bin
            - immortalwrt/bin/targets/airoha/an7581/*.factory.bin
          retention-days: 30

      - name: Upload build logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path:
            - immortalwrt/logs/
            - immortalwrt/.config
          retention-days: 7
