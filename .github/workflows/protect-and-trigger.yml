# 🔒 配置文件保护 & 违规自动执行（无循环、无冗余、白名单版）
name: 配置文件保护 & 违规自动执行

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  protect-and-execute:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查是否违规修改配置文件
        id: check-violation
        run: |
          VIOLATION="false"
          # 兼容首次提交无父节点的情况
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          else
            CHANGED_FILES=$(git diff --name-only HEAD)
          fi

          # 禁止的文件规则（可自定义）
          FORBIDDEN=(
            "*.yml"
            "*.yaml"
            "*.config"
            "config/*"
            "**/*.yml"
            "**/*.yaml"
          )

          # 白名单：保护脚本自身不被拦截
          WHITELIST=(
            ".github/workflows/protect-and-trigger.yml"
          )

          for FILE in $CHANGED_FILES; do
            # 跳过白名单文件
            if [[ " ${WHITELIST[@]} " =~ " $FILE " ]]; then
              echo "✅ 白名单文件，跳过检查：$FILE"
              continue
            fi

            # 检查是否匹配禁止规则
            for PAT in "${FORBIDDEN[@]}"; do
              if [[ "$FILE" == $PAT ]]; then
                echo "❌ 违规文件：$FILE"
                VIOLATION="true"
              fi
            done
          done

          echo "violation=$VIOLATION" >> $GITHUB_OUTPUT
          echo "✅ 违规检查完成，状态：$VIOLATION"

      - name: 违规时执行Nokia.yml逻辑（无额外记录）
        if: steps.check-violation.outputs.violation == 'true'
        run: |
          echo "🚨 检测到违规修改，自动执行Nokia.yml逻辑..."
          # 👇 直接在这里写你Nokia.yml里的所有执行步骤！
          # 示例（替换成你自己的逻辑）：
          # echo "执行你的自动化操作..."
          # bash your-script.sh
          # curl -X POST https://your-webhook-url
          echo "✅ 违规逻辑执行完成"

      - name: 违规阻断提交
        if: steps.check-violation.outputs.violation == 'true'
        run: |
          echo "❌ 禁止修改/新建任何 .yml / .yaml / config 文件！提交已被阻断"
          exit 1

      - name: 合规提交通过
        if: steps.check-violation.outputs.violation == 'false'
        run: |
          echo "✅ 本次提交合规，流程正常通过"
