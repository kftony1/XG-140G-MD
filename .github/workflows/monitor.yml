name: Monitor Config Changes

on:
  push:
    paths:
      - 'config/.config'
      - '.github/workflows/Nokia.yml'
      - '.github/workflows/*.yml'
    branches:
      - main
      - develop
      - master
      - release
      - staging
      - production
  workflow_dispatch:

jobs:
  detect-and-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          
      - name: Get changed files
        id: changed
        run: |
          # 获取本次 push 变更的文件
          if [ "${{ github.event_name }}" = "push" ]; then
            CHANGED=$(git diff --name-only HEAD^ HEAD | grep -E '(config/\.config|\.yml|\.yaml)$' | tr '\n' ',' || true)
          else
            # 手动触发时，检查最近一次提交
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '(config/\.config|\.yml|\.yaml)$' | tr '\n' ',' || true)
          fi
          
          echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT
          
          if [ -n "$CHANGED" ]; then
            echo "📝 Changed files: $CHANGED"
          else
            echo "ℹ️ No config/yml files changed"
          fi
          
      - name: Check if Nokia.yml exists
        id: check_workflow
        run: |
          if [ -f ".github/workflows/Nokia.yml" ]; then
            echo "workflow_exists=true" >> $GITHUB_OUTPUT
            echo "✅ Nokia.yml found"
          else
            echo "workflow_exists=false" >> $GITHUB_OUTPUT
            echo "❌ Nokia.yml not found"
          fi
          
      - name: Trigger Nokia.yml workflow
        if: steps.changed.outputs.changed_files != '' && steps.check_workflow.outputs.workflow_exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = '${{ steps.changed.outputs.changed_files }}';
            const workflowFile = 'Nokia.yml';
            
            console.log(`📝 Changed files: ${changedFiles}`);
            console.log(`🚀 Triggering workflow: ${workflowFile}`);
            
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowFile,
                ref: context.ref,
                inputs: {
                  triggered_by: 'monitor_workflow',
                  changed_files: changedFiles,
                  timestamp: new Date().toISOString()
                }
              });
              console.log(`✅ Successfully triggered ${workflowFile}`);
            } catch (error) {
              console.log(`❌ Failed to trigger: ${error.message}`);
              throw error;
            }
            
      - name: Skip trigger - no changes or workflow missing
        if: steps.changed.outputs.changed_files == '' || steps.check_workflow.outputs.workflow_exists != 'true'
        run: |
          if [ -z "${{ steps.changed.outputs.changed_files }}" ]; then
            echo "ℹ️ No config/yml files changed, skipping trigger"
          fi
          if [ "${{ steps.check_workflow.outputs.workflow_exists }}" != "true" ]; then
            echo "⚠️ Nokia.yml not found, cannot trigger"
          fi
          
      - name: Summary
        run: |
          echo "## 📊 Monitor Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 变更文件 | ${{ steps.changed.outputs.changed_files || '无' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Nokia.yml 存在 | ${{ steps.check_workflow.outputs.workflow_exists == 'true' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 触发状态 | ${{ steps.changed.outputs.changed_files != '' && steps.check_workflow.outputs.workflow_exists == 'true' && '✅ 已触发' || '⏸️ 未触发' }} |" >> $GITHUB_STEP_SUMMARY
