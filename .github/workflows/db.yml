name: Build AN7581 OpenWrt
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      # 拉取源码
      - name: Clone Ansuel airoha-an7581
        run: git clone --depth=1 https://github.com/Ansuel/openwrt -b airoha-an7581 openwrt

      # 执行自定义脚本
      - name: Run custom.sh
        run: |
          chmod +x custom.sh
          ./custom.sh

      # 复制你仓库的 config/.config
      - name: Apply .config from repo config/
        run: |
          cp -f config/.config openwrt/.config
          cd openwrt
          make defconfig

      # 更新 feeds
      - name: Update & install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 保持内核版本一致
      - name: Make defconfig (fix kernel version)
        run: |
          cd openwrt
          make defconfig

      # 下载依赖
      - name: Download dependencies
        run: |
          cd openwrt
          make download -j$(nproc)

      # ======================
      # 优化核心：无截断编译日志
      # ======================
      - name: Build (NO LOG TRUNCATE)
        run: |
          cd openwrt
          make -j$(nproc) V=s > build.log 2>&1

      # 上传完整日志（永远不会截断）
      - name: Upload FULL build log (100% complete)
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: openwrt/build.log
          compression-level: 1
          overwrite: true

      # 上传固件
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: openwrt/bin/targets/*/*
          compression-level: 1
          overwrite: true
