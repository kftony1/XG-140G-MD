name: Build_XG-040G-MD_AN7581

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH 调试（专业人员用）'
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: config/.config
  CUSTOM_SH: custom.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取本仓库代码
        uses: actions/checkout@main

      - name: 释放磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true

      - name: 显示系统资源
        run: df -h && free -h && nproc

      - name: 安装编译依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -y && sudo apt-get upgrade -y
          sudo apt-get install -y build-essential clang flex g++ gawk gcc-multilib gettext \
          git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev libelf-dev \
          wget curl jq qemu-utils device-tree-compiler
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: 安装 CMake 3.31.5（x86_64）
        run: |
          wget https://github.com/Kitware/CMake/releases/download/v3.31.5/cmake-3.31.5-linux-x86_64.tar.gz
          tar -zxf cmake-3.31.5-linux-x86_64.tar.gz
          sudo cp -rf cmake-3.31.5-linux-x86_64/bin/* /usr/bin/
          sudo cp -rf cmake-3.31.5-linux-x86_64/share/* /usr/share/
          cmake --version

      - name: 克隆 Ansuel an7581 源码
        run: |
          git clone --depth 1 https://github.com/Ansuel/openwrt.git -b an7581 openwrt

      - name: 替换为 ImmortalWrt 官方 feeds
        run: |
          cd openwrt
          rm -f feeds.conf
          cat > feeds.conf <<EOF
src-git packages https://github.com/immortalwrt/packages.git
src-git luci https://github.com/immortalwrt/luci.git
src-git routing https://github.com/immortalwrt/routing.git
src-git telephony https://github.com/immortalwrt/telephony.git
EOF
          cat feeds.conf

      - name: 更新并安装 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 运行 custom.sh（你的自定义脚本）
        run: |
          chmod +x $CUSTOM_SH
          mv $CUSTOM_SH openwrt/
          cd openwrt
          ./$CUSTOM_SH

      - name: 加载你的 .config 配置
        run: |
          cd openwrt
          cp -f ../$CONFIG_FILE .config
          make defconfig

      - name: 下载编译依赖
        run: |
          cd openwrt
          make download -j4

      - name: SSH 调试（可选）
        if: github.event.inputs.ssh == 'true'
        uses: mxschmitt/action-tmate@main

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 上传固件产物
        uses: actions/upload-artifact@main
        with:
          name: XG-040G-MD_Firmware
          path: openwrt/bin/targets/
