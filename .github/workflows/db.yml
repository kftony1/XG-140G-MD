name: XG-140G-MD-最终完美版
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 480

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化环境（100%无错）
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt remove -y --purge needrestart
          sudo apt autoremove -y
          sudo apt update -yq
          sudo apt install -yq build-essential ccache libncurses5-dev libssl-dev libelf-dev git curl unzip bison flex device-tree-compiler
          
          # 修复 swap 错误（你刚才报错的地方）
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: 拉取源码
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git --depth 1 openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载配置
        run: |
          cp config/.config openwrt/.config
          cd openwrt
          make defconfig

      - name: 自定义脚本
        run: |
          chmod +x custom.sh
          cd openwrt
          ../custom.sh

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 编译工具链（不卡）
        run: |
          cd openwrt
          make toolchain/install -j$(nproc)

      - name: 编译固件（多核 不卡）
        run: |
          cd openwrt
          make -j$(nproc)

      - name: 查看固件
        run: |
          ls -la openwrt/bin/targets/airoha/an7581/

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: XG-140G-MD-固件
          path: openwrt/bin/targets/airoha/an7581/
