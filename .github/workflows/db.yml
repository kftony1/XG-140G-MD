name: Build_XG-040G-MD_AN7581

on:
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: 'OpenWrt 源码仓库'
        required: true
        default: 'https://github.com/Ansuel/openwrt.git'
        type: string
      openwrt_branch:
        description: 'OpenWrt 源码分支'
        required: true
        default: 'openwrt-24.10-airoha-an7581-stable'
        type: string

env:
  CONFIG_FILE: config/.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true

      - name: Show system info
        run: df -h && free -h && nproc

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential clang flex g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev libelf-dev wget curl jq qemu-utils device-tree-compiler
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: Install CMake 3.31.5
        run: |
          wget https://github.com/Kitware/CMake/releases/download/v3.31.5/cmake-3.31.5-linux-x86_64.tar.gz
          tar -zxf cmake-3.31.5-linux-x86_64.tar.gz
          sudo cp -rf cmake-3.31.5-linux-x86_64/bin/* /usr/bin/
          sudo cp -rf cmake-3.31.5-linux-x86_64/share/* /usr/share/
          cmake --version

      - name: 克隆 AN7581 源码 + 配置 ImmortalWrt feeds
        run: |
          set -e
          git clone --depth 1 ${{ github.event.inputs.openwrt_repo }} -b ${{ github.event.inputs.openwrt_branch }} openwrt
          cd openwrt
          cp feeds.conf.default feeds.conf.default.bak
          echo "src-git packages https://github.com/immortalwrt/packages.git;master" > feeds.conf.default
          echo "src-git luci https://github.com/immortalwrt/luci.git;master" >> feeds.conf.default
          echo "src-git routing https://github.com/openwrt/routing.git;master" >> feeds.conf.default
          echo "src-git telephony https://github.com/openwrt/telephony.git;master" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入 network 和 shadow 配置
        run: |
          cd openwrt
          mkdir -p files/etc/config
          mkdir -p files/etc
          # 写入 network
          cat <<-'EOF' > files/etc/config/network
          config interface 'loopback'
              option ifname 'lo'
              option proto 'static'
              option ipaddr '127.0.0.1'
              option netmask '255.0.0.0'

          config interface 'lan'
              option ifname 'eth0'
              option proto 'static'
              option ipaddr '192.168.1.1'
              option netmask '255.255.255.0'
              option ip6assign '60'

          config interface 'wan'
              option ifname 'lan1'
              option proto 'dhcp'

          config interface 'wan6'
              option ifname 'lan1'
              option proto 'dhcpv6'
          EOF
          # 写入 shadow
          cat <<-'EOF' > files/etc/shadow
          root:$1$WnUqCk5R$CvC8R.pJH5tT9qkO7xN5d/:0:0:99999:7:::
          daemon:*:0:0:99999:7:::
          ftp:*:0:0:99999:7:::
          nobody:*:0:0:99999:7:::
          EOF
          chmod 644 files/etc/config/network
          chmod 600 files/etc/shadow

      - name: 加载 .config
        run: |
          cd openwrt
          cp -f ../$CONFIG_FILE .config
          make defconfig

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j4

      - name: 开始编译
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: XG-040G-MD_Firmware
          path: openwrt/bin/targets/
