name: Build AN7581 OpenWrt
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      # ✅ 修复：正确分支 an7581
      - name: Clone Ansuel an7581 source
        run: git clone --depth=1 https://github.com/Ansuel/openwrt -b an7581 openwrt

      - name: Run custom.sh
        run: |
          chmod +x custom.sh
          ./custom.sh

      # ✅ 使用你仓库 config/.config
      - name: Apply .config
        run: |
          cp -f config/.config openwrt/.config
          cd openwrt
          make defconfig

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Defconfig (keep kernel same)
        run: |
          cd openwrt
          make defconfig

      - name: Download dependencies
        run: |
          cd openwrt
          make download -j$(nproc)

      # ✅ 日志绝对不截断（直接写入文件）
      - name: Build (Full log NO TRUNCATE)
        run: |
          cd openwrt
          make -j$(nproc) V=s > build.log 2>&1

      # ✅ 上传完整日志
      - name: Upload full log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: openwrt/build.log
          compression-level: 1

      # ✅ 上传固件
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: openwrt/bin/targets/*/*
          compression-level: 1
