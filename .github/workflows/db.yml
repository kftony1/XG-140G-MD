name: ImmortalWrt Official Build for Nokia XG-140G-MD
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create directories
        run: mkdir -p immortalwrt/configs

      - name: Cache downloads for speedup
        uses: actions/cache@v4
        with:
          path: |
            immortalwrt/dl
          key: ${{ runner.os }}-immortalwrt-dl-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-immortalwrt-dl-

      - name: Install build dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev ccache flex bison python3 python3-pip libelf-dev wget curl xsltproc rsync

      - name: Clean old source
        run: sudo rm -rf immortalwrt/

      - name: Clone official ImmortalWrt source
        run: git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git immortalwrt

      - name: Use your .config from repo
        run: cp -f config/.config immortalwrt/.config

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply default config
        run: |
          cd immortalwrt
          make defconfig

      - name: Create custom files directory
        run: mkdir -p immortalwrt/files/etc/config

      - name: Write network config
        run: |
          cat <<'EOF' > immortalwrt/files/etc/config/network
config interface 'loopback'
    option ifname 'lo'
    option proto 'static'
    option ipaddr '127.0.0.1'
    option netmask '255.0.0.0'

config interface 'lan'
    option ifname 'eth0'
    option proto 'static'
    option ipaddr '192.168.1.1'
    option netmask '255.255.255.0'
    option ip6assign '60'

config interface 'wan'
    option ifname 'eth1'
    option proto 'dhcp'

config interface 'wan6'
    option ifname 'eth1'
    option proto 'dhcpv6'
EOF

      - name: Write passwd
        run: |
          cat <<'EOF' > immortalwrt/files/etc/passwd
root:$1$WnUqCk5R$CvC8R.pJH5tN5d/:0:0:99999:7:::
daemon:*:0:0:99999:7:::
ftp:*:0:0:99999:7:::
nobody:*:0:0:99999:7:::
EOF

      - name: Download all dependencies
        run: |
          cd immortalwrt
          make download -j$(nproc) V=s

      - name: Start official build (single thread for Airoha stability)
        run: |
          cd immortalwrt
          make -j1 V=s 2>&1 | tee build.log

      - name: Show firmware info
        run: ls -lh immortalwrt/bin/targets/airoha/*/

      - name: Upload full firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-Nokia-XG-140G-MD
          path: immortalwrt/bin/targets/**/*
          if-no-files-found: error
