# 名称：Nokia XG-040G-MD ImmortalWrt 云编译
name: Build ImmortalWrt for XG-040G-MD

# 触发条件：手动触发编译
on:
  workflow_dispatch:
    inputs:
      target:
        description: '编译目标平台'
        required: true
        default: 'arm64'
      branch:
        description: 'ImmortalWrt 分支'
        required: true
        default: 'master'

# 权限配置：确保产物可上传下载
permissions:
  contents: write
  actions: read
  packages: write

# 全局环境变量（适配你的设备）
env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: ${{ github.event.inputs.branch }}
  DEVICE_TARGET: arm64
  DEVICE_SUBTARGET: generic
  CONFIG_FILE: config/.config
  CUSTOM_SH: custom.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

# 编译任务
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 1440

    # 步骤日志输出优化，防止截断
    steps:
    - name: 检查项目仓库
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 服务器环境优化
    - name: 初始化编译环境
      run: |
        sudo apt update -y
        sudo apt upgrade -y
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
        git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
        libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw6-dev libreadline-dev libssl-dev \
        libtool libyaml-dev libz-dev lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf \
        python3-pip python3-pyelftools qemu-utils rsync scons squashfs-tools subversion swig texinfo \
        uglifyjs unzip upx-ucl vim wget xmlto xxd zlib1g-dev
        sudo timedatectl set-timezone "$TZ"
        sudo swapoff -a
        sudo rm -f /swapfile
        sudo fallocate -l 16G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        df -h

    # 源码缓存（大幅加速编译）
    - name: 缓存源码与依赖
      uses: actions/cache@v4
      id: cache-source
      with:
        path: |
          openwrt/
          !openwrt/.git/
          !openwrt/tmp/
          !openwrt/build_dir/
          !openwrt/staging_dir/
          !openwrt/bin/
        key: source-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}
        restore-keys: |
          source-${{ env.REPO_BRANCH }}-

    - name: 拉取ImmortalWrt官方源码
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt

    - name: 拉取官方 feeds 依赖
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # 加载你的自定义配置文件
    - name: 加载编译配置文件
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        cd openwrt
        make defconfig

    # 下载编译依赖（缓存+断点续传）
    - name: 下载依赖包
      run: |
        cd openwrt
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    # 核心编译步骤（完整错误日志输出）
    - name: 编译固件（单线程输出完整错误）
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "==================== 编译信息 ===================="
        grep -i '^config.*' .config | head -20
        df -h

    # 整理固件产物
    - name: 整理固件文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && success()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    # 上传固件到 Actions 产物（可直接下载）
    - name: 上传固件到 Actions
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: ImmortalWrt-XG-040G-MD-${{ env.REPO_BRANCH }}
        path: ${{ env.FIRMWARE_PATH }}
        retention-days: 90
        compression-level: 0

    # 上传固件到 GitHub Release（永久存储+下载按钮）
    - name: 上传固件到 Release
      uses: softprops/action-gh-release@v2
      if: env.UPLOAD_RELEASE == 'true' && success()
      with:
        name: Nokia XG-040G-MD ImmortalWrt 固件
        tag_name: ${{ env.REPO_BRANCH }}-${{ github.run_number }}
        files: ${{ env.FIRMWARE_PATH }}/*
        body: |
          设备：Nokia XG-040G-MD (AIRHOA AN7581)
          架构：ARMv8 A53
          硬件：复旦微 FM25G02BI3 / 达发 EN8811H 2.5G PHY / USB3.0/2.0
          源码：ImmortalWrt 官方 ${{ env.REPO_BRANCH }}
          编译时间：$(date +"%Y-%m-%d %H:%M:%S")
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
