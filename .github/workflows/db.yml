name: XG-140G-MD-单核-完整日志-最终版

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 420

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 初始化环境（无弹窗·无报错·纯稳定）
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt remove -y needrestart
          sudo apt update -yq
          sudo apt install -yq build-essential ccache libncurses5-dev libssl-dev libelf-dev git curl unzip bison flex device-tree-compiler

      - name: 拉取ImmortalWrt源码
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git --depth=1 openwrt

      - name: 加载.config配置
        run: |
          cp config/.config openwrt/.config
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig

      - name: 运行自定义脚本custom.sh
        run: |
          chmod +x custom.sh
          cd openwrt
          ../custom.sh

      - name: 下载所有依赖（完整日志）
        run: |
          cd openwrt
          make download -j1 V=s

      - name: 单核编译固件（-j1 不截断日志 最稳定）
        run: |
          cd openwrt
          make -j1 V=s

      - name: 显示固件文件
        run: |
          ls -la openwrt/bin/targets/airoha/an7581/

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: 固件-XG-140G-MD
          path: openwrt/bin/targets/airoha/an7581/
