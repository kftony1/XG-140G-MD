name: Build_XG-040G-MD_AN7581

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH Debug'
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: config/.config
  CUSTOM_SH: custom.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true

      - name: Show system info
        run: df -h && free -h && nproc

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential clang flex g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev libelf-dev wget curl jq qemu-utils device-tree-compiler
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: Install CMake 3.31.5
        run: |
          wget https://github.com/Kitware/CMake/releases/download/v3.31.5/cmake-3.31.5-linux-x86_64.tar.gz
          tar -zxf cmake-3.31.5-linux-x86_64.tar.gz
          sudo cp -rf cmake-3.31.5-linux-x86_64/bin/* /usr/bin/
          sudo cp -rf cmake-3.31.5-linux-x86_64/share/* /usr/share/
          cmake --version

      - name: Clone source code
        run: git clone --depth 1 https://github.com/Ansuel/openwrt.git -b an7581 openwrt

      - name: Replace feeds
        run: |
          cd openwrt
          rm -f feeds.conf
          echo "src-git packages https://github.com/immortalwrt/packages.git" >> feeds.conf
          echo "src-git luci https://github.com/immortalwrt/luci.git" >> feeds.conf
          echo "src-git routing https://github.com/immortalwrt/routing.git" >> feeds.conf
          echo "src-git telephony https://github.com/immortalwrt/telephony.git" >> feeds.conf

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Run custom.sh
        run: |
          chmod +x $CUSTOM_SH
          mv $CUSTOM_SH openwrt/
          cd openwrt
          ./$CUSTOM_SH

      - name: Load config
        run: |
          cd openwrt
          cp -f ../$CONFIG_FILE .config
          make defconfig

      - name: Download dependencies
        run: |
          cd openwrt
          make download -j4

      - name: SSH debug
        if: github.event.inputs.ssh == 'true'
        uses: mxschmitt/action-tmate@v3

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@main
        with:
          name: XG-040G-MD_Firmware
          path: openwrt/bin/targets/
