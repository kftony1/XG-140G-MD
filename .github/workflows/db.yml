name: Build_XG-040G-MD_AN7581

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true

      - name: Show system info
        run: df -h && free -h && nproc

      - name: 安装依赖环境
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev libelf-dev wget curl jq qemu-utils device-tree-compiler

      - name: 克隆 Ansuel AN7581 源码 (24.10 稳定版)
        run: |
          git clone --depth 1 https://github.com/Ansuel/openwrt.git -b openwrt-24.10-airoha-an7581-stable openwrt

      - name: 替换为 ImmortalWrt 24.10 匹配 feeds
        run: |
          cd openwrt
          cat > feeds.conf <<EOF
          src-git packages https://github.com/immortalwrt/packages.git;openwrt-24.10
          src-git luci https://github.com/immortalwrt/luci.git;openwrt-24.10
          src-git routing https://github.com/immortalwrt/routing.git;openwrt-24.10
          src-git telephony https://github.com/immortalwrt/telephony.git;openwrt-24.10
          EOF

      - name: 更新 feeds 并安装软件包
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入 network & shadow 配置
        run: |
          cd openwrt
          mkdir -p files/etc/config
          echo "config interface 'loopback'" > files/etc/config/network
          echo "    option ifname 'lo'" >> files/etc/config/network
          echo "    option proto 'static'" >> files/etc/config/network
          echo "    option ipaddr '127.0.0.1'" >> files/etc/config/network
          echo "    option netmask '255.0.0.0'" >> files/etc/config/network
          echo "" >> files/etc/config/network
          echo "config interface 'lan'" >> files/etc/config/network
          echo "    option ifname 'eth0'" >> files/etc/config/network
          echo "    option proto 'static'" >> files/etc/config/network
          echo "    option ipaddr '192.168.1.1'" >> files/etc/config/network
          echo "    option netmask '255.255.255.0'" >> files/etc/config/network
          echo "    option ip6assign '60'" >> files/etc/config/network
          echo "" >> files/etc/config/network
          echo "config interface 'wan'" >> files/etc/config/network
          echo "    option ifname 'lan1'" >> files/etc/config/network
          echo "    option proto 'dhcp'" >> files/etc/config/network
          echo "" >> files/etc/config/network
          echo "config interface 'wan6'" >> files/etc/config/network
          echo "    option ifname 'lan1'" >> files/etc/config/network
          echo "    option proto 'dhcpv6'" >> files/etc/config/network
          echo "root:\$1\$WnUqCk5R\$CvC8R.pJH5tT9qkO7xN5d/:0:0:99999:7:::" > files/etc/shadow
          echo "daemon:*:0:0:99999:7:::" >> files/etc/shadow
          chmod 644 files/etc/config/network
          chmod 600 files/etc/shadow

      - name: 写入完整 .config (已修复 生成固件)
        run: |
          cd openwrt
          cat > .config <<'EOF'
# ===================== 设备目标 =====================
CONFIG_TARGET_airoha=y
CONFIG_TARGET_airoha_an7581=y
# CONFIG_TARGET_MULTI_PROFILE is not set
CONFIG_TARGET_airoha_an7581_DEVICE_nokia_xg-040g-md=y
CONFIG_TARGET_ROOTFS_PARTSIZE=512

# ===================== 基础系统 =====================
CONFIG_BUSYBOX_CONFIG_FEATURE_TOP_SMP_CPU=y
CONFIG_BUSYBOX_CONFIG_PASSWD=y
CONFIG_TARGET_INIT_PATH="/usr/sbin:/usr/bin:/sbin:/bin"
CONFIG_TARGET_PREINIT_SUPPRESS_FAILSAFE_NETWORK=y

# ===================== 优化配置 =====================
CONFIG_TARGET_OPTIMIZATION="-Os -pipe -march=armv8-a+crc+crypto -mcpu=cortex-a53"
CONFIG_USE_MUSL=y
CONFIG_CCACHE=y
CONFIG_STRIP_KERNEL_EXPORTS=y
CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=256

# ===================== LuCI 中文界面 =====================
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-base=y
CONFIG_LUCI_LANG_zh_Hans=y

# ===================== LuCI 主题 (Argon) =====================
CONFIG_PACKAGE_luci-theme-argon=y

# ===================== 终端 (ttyd) =====================
CONFIG_PACKAGE_luci-app-ttyd=y

# ===================== 软件包管理界面 =====================
CONFIG_PACKAGE_opkg=y
CONFIG_PACKAGE_luci-app-opkg=y

# ===================== 网络向导 =====================
CONFIG_PACKAGE_luci-app-quickstart=y

# ===================== 禁用有问题的包 =====================
# CONFIG_PACKAGE_rpcd-mod-luci is not set
# CONFIG_PACKAGE_rpcd-mod-rrdns is not set

# ===================== 看门狗支持 =====================
CONFIG_PACKAGE_kmod-wdt-en7581=y
CONFIG_WATCHDOG=y
CONFIG_WATCHDOG_CORE=y
CONFIG_WATCHDOG_HANDLE_BOOT_ENABLED=y

# ===================== AN7581 核心驱动 =====================
CONFIG_PACKAGE_kmod-airoha-eth=y
CONFIG_PACKAGE_kmod-phy-en8811h=y
CONFIG_PACKAGE_airoha-en8811h-firmware=y
CONFIG_PACKAGE_kmod-airoha-npu=y
CONFIG_PACKAGE_airoha-npu-firmware=y
CONFIG_PACKAGE_kmod-mtd-spi-nand=y
CONFIG_PACKAGE_kmod-spi-airoha-snfi=y
CONFIG_PACKAGE_kmod-spi-nor=y
CONFIG_PACKAGE_kmod-hwmon-airoha=y
CONFIG_PACKAGE_kmod-thermal-airoha=y
CONFIG_PACKAGE_kmod-reset-airoha=y
CONFIG_PACKAGE_kmod-gpio-button-hotplug=y
CONFIG_PACKAGE_kmod-leds-airoha=y
CONFIG_PACKAGE_kmod-cpufreq-en7581=y
CONFIG_PACKAGE_kmod-pcie-airoha=y

# ===================== USB 支持 =====================
CONFIG_PACKAGE_kmod-usb2=y
CONFIG_PACKAGE_kmod-usb3=y
CONFIG_PACKAGE_kmod-usb-storage=y
CONFIG_PACKAGE_kmod-usb-ehci=y
CONFIG_PACKAGE_kmod-phy-airoha-usb=y
CONFIG_PACKAGE_block-mount=y

# ===================== Flash 与 MTD =====================
CONFIG_KERNEL_MTD=y
CONFIG_KERNEL_MTD_PARTS=y
CONFIG_KERNEL_MTD_BLOCK=y
CONFIG_KERNEL_MTD_CHAR=y
CONFIG_KERNEL_MTD_SPI_NOR=y
CONFIG_KERNEL_SPI_MASTER=y
CONFIG_PACKAGE_mtd-utils=y
CONFIG_PACKAGE_ubi-utils=y

# ===================== 网络基础 =====================
CONFIG_PACKAGE_firewall4=y
CONFIG_PACKAGE_dnsmasq-full=y
CONFIG_PACKAGE_odhcpd=y
CONFIG_PACKAGE_odhcp6c=y

# ===================== PPPoE 拨号支持 =====================
CONFIG_PACKAGE_ppp=y
CONFIG_PACKAGE_ppp-mod-pppoe=y
CONFIG_PACKAGE_kmod-ppp=y
CONFIG_PACKAGE_kmod-pppoe=y
CONFIG_PACKAGE_kmod-pppox=y

# ===================== 时间同步 =====================
CONFIG_PACKAGE_chrony=y

# ===================== 网络加速 =====================
CONFIG_PACKAGE_kmod-ipt-fullconenat=y
CONFIG_PACKAGE_kmod-ipt-offload=y
CONFIG_PACKAGE_kmod-nf-flow=y
CONFIG_PACKAGE_kmod-nft-offload=y
CONFIG_PACKAGE_ethtool=y
CONFIG_KERNEL_NFT_FLOW_OFFLOAD=y

# ===================== TCP 优化 =====================
CONFIG_KERNEL_TCP_CONG_BBR=y
CONFIG_KERNEL_DEFAULT_TCP_CONG="bbr"

# ===================== 科学上网内核依赖 =====================
CONFIG_PACKAGE_kmod-tun=y
CONFIG_PACKAGE_iptables-mod-tproxy=y
CONFIG_PACKAGE_kmod-nft-tproxy=y

# ===================== VLAN / 桥接支持 =====================
CONFIG_PACKAGE_kmod-8021q=y
CONFIG_PACKAGE_kmod-bridge=y
CONFIG_PACKAGE_kmod-br-netfilter=y

# ===================== 内核网络选项 =====================
CONFIG_KERNEL_NET_VENDOR_MEDIATEK=n
# CONFIG_NET_VENDOR_MEDIATEK is not set
CONFIG_KERNEL_NET_VENDOR_REALTEK=n
# CONFIG_NET_VENDOR_REALTEK is not set
CONFIG_KERNEL_NET_VENDOR_SYNOPSYS=n
# CONFIG_NET_VENDOR_SYNOPSYS is not set
CONFIG_KERNEL_NET_SWITCHDEV=y
CONFIG_KERNEL_IPV6=y
CONFIG_KERNEL_BRIDGE_VLAN_FILTERING=y

# ===================== SSH 配置 =====================
CONFIG_PACKAGE_dropbear=y
CONFIG_DROPBEAR_CURVE25519=y
EOF
          make defconfig

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 开始编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s 2>&1
        shell: bash

      - name: 上传编译日志
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: openwrt/build.log

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: XG-040G-MD_Firmware
          path: openwrt/bin/targets/airoha/
