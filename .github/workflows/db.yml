name: Build AN7581 OpenWrt
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set variables
        run: |
          echo "REPO_URL=https://github.com/Ansuel/openwrt" >> $GITHUB_ENV
          echo "REPO_BRANCH=openwrt-24.10-airoha-an7581-stable" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone source code
        run: |
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt

      - name: Run custom.sh
        run: |
          chmod +x custom.sh
          ./custom.sh

      - name: Apply your config/.config
        run: |
          cp -f config/.config openwrt/.config
          cd openwrt
          make defconfig

      - name: Update feeds (use source default)
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Final defconfig (keep kernel consistent)
        run: |
          cd openwrt
          make defconfig

      - name: Download dependencies
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Build (NO TRUNCATE LOG)
        run: |
          cd openwrt
          make -j$(nproc) V=s > build.log 2>&1

      - name: Upload full build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: openwrt/build.log
          compression-level: 1

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: openwrt/bin/targets/*/*
          compression-level: 1
