name: 编译 ImmortalWrt (AN7581) for Nokia XG-040G-MD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'config/.config'
      - 'custom.sh'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: write

    steps:
      - name: 1. 检出用户仓库
        uses: actions/checkout@v4

      - name: 2. 初始化编译环境
        run: |
          set -e
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk git subversion \
            gettext unzip file python3 python3-distutils rsync qemu-utils zstd \
            libssl-dev libelf-dev wget swig
          
          # 移除旧版 CMake
          sudo apt remove -y cmake || true
          sudo rm -f /usr/local/bin/cmake /usr/local/bin/ctest /usr/local/bin/cpack
          
          # 从 GitHub 下载 CMake 3.31.5 二进制包
          wget -q https://github.com/Kitware/CMake/releases/download/v3.31.5/cmake-3.31.5-linux-x86_64.tar.gz
          sudo tar -xzf cmake-3.31.5-linux-x86_64.tar.gz -C /usr/local --strip-components=1
          rm cmake-3.31.5-linux-x86_64.tar.gz
          
          echo "/usr/local/bin" >> $GITHUB_PATH
          export PATH="/usr/local/bin:$PATH"
          
          echo ">>> CMake 版本："
          cmake --version

      - name: 3. 释放磁盘空间
        run: |
          set -e
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -af || true

      - name: 4. 克隆 Ansuel 大神 OpenWrt 分支（AN7581 驱动与补丁）
        run: |
          set -e
          export PATH="/usr/local/bin:$PATH"
          
          git clone --depth 1 https://github.com/Ansuel/openwrt.git -b openwrt-24.10-airoha-an7581-stable openwrt
          cd openwrt
          
          cp feeds.conf.default feeds.conf.default.bak
          echo "src-git packages https://github.com/immortalwrt/packages.git;master" > feeds.conf.default
          echo "src-git luci https://github.com/immortalwrt/luci.git;master" >> feeds.conf.default
          echo "src-git routing https://github.com/openwrt/routing.git;master" >> feeds.conf.default
          echo "src-git telephony https://github.com/openwrt/telephony.git;master" >> feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 5. 应用用户自定义配置文件 (.config) 并删除有问题的包
        run: |
          set -e
          export PATH="/usr/local/bin:$PATH"
          
          echo ">>> 复制用户 .config 文件..."
          cp ${{ github.workspace }}/config/.config ${{ github.workspace }}/openwrt/.config
          cd ${{ github.workspace }}/openwrt
          
          echo ">>> 执行 make defconfig..."
          make defconfig
          
          echo ">>> 强制删除有问题的 rpcd-mod-luci 包..."
          rm -rf feeds/luci/libs/rpcd-mod-luci
          rm -rf package/feeds/luci/rpcd-mod-luci
          
          echo ">>> 配置检查完成"

      - name: 6. 执行自定义脚本 (custom.sh)
        run: |
          set -e
          chmod +x ${{ github.workspace }}/custom.sh
          ${{ github.workspace }}/custom.sh ${{ github.workspace }}/openwrt

      - name: 7. 下载编译所需的源码包
        working-directory: openwrt
        run: |
          set -e
          make download -j$(nproc) || make download -j1 V=s

      - name: 8. 开始编译固件
        working-directory: openwrt
        run: |
          set -e
          export PATH="/usr/local/bin:$PATH"
          echo ">>> 编译前 CMake 版本确认："
          cmake --version
          
          make -j$(nproc) || make -j1 V=s

      - name: 9. 打包固件并准备上传
        run: |
          set -e
          mkdir -p ${{ github.workspace }}/firmware
          cd ${{ github.workspace }}/openwrt/bin/targets/airoha/an7581
          
          echo ">>> 生成的固件文件列表："
          ls -la
          
          for f in *sysupgrade.bin; do
            [ -f "$f" ] && cp "$f" ${{ github.workspace }}/firmware/
          done
          
          cd ${{ github.workspace }}/firmware
          sha256sum *.bin > checksums.txt
          echo ">>> 打包完成，固件校验和："
          cat checksums.txt

      - name: 10. 上传固件到 Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-AN7581-Nokia-XG-040G-MD
          path: ${{ github.workspace }}/firmware/
          retention-days: 90
