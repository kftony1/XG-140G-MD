# .github/workflows/build.yml
name: Build LEDE Firmware for Nokia XG-140G-MD

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH debug mode'
        required: false
        default: 'false'
  push:
    branches: [ main, master ]
    paths:
      - 'config/.config'
      - 'custom.sh'
      - '.github/workflows/*.yml'

env:
  # 使用 Lean 仓库（编译成功率更高，更稳定）
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  DEVICE_NAME: Nokia-XG140G-MD
  CONFIG_FILE: config/.config
  CUSTOM_SCRIPT: custom.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 480
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo apt clean
        sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android /opt/ghc /usr/local/share/boost
        docker rmi $(docker images -q) 2>/dev/null || true
        df -h

    - name: Prepare build environment
      run: |
        sudo apt update -y
        sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget \
          python3 python3-pip python3-pyelftools patch bc cpio ccache \
          lz4 liblz4-tool time
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone --depth 1 --branch ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt
        cd openwrt

    - name: Set execute permission for custom.sh
      run: |
        if [ -f "${{ env.CUSTOM_SCRIPT }}" ]; then
          chmod +x "${{ env.CUSTOM_SCRIPT }}"
          echo "Execute permission granted"
        fi

    - name: Apply custom config and scripts
      run: |
        cd openwrt
        # 复制 .config
        cp -f "../${{ env.CONFIG_FILE }}" .config 2>/dev/null || { echo "Error: .config not found"; exit 1; }
        # 运行 custom.sh
        if [ -f "../${{ env.CUSTOM_SCRIPT }}" ]; then
          bash "../${{ env.CUSTOM_SCRIPT }}"
        fi

    - name: Cache build artifacts
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/.ccache
          openwrt/build_dir
          openwrt/staging_dir
        key: ${{ env.DEVICE_NAME }}-lede-${{ hashFiles('openwrt/.config') }}
        restore-keys: |
          ${{ env.DEVICE_NAME }}-lede-
          ${{ env.DEVICE_NAME }}-

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure and download sources
      run: |
        cd openwrt
        make defconfig
        make download -j4
        find dl -size -1024c -exec rm -f {} \; 2>/dev/null || true
        
        # 显示当前配置
        echo "=== Current target configuration ==="
        grep "CONFIG_TARGET" .config | grep -v "^#" | head -10

    - name: Compile firmware
      id: compile
      run: |
        cd openwrt
        export PATH="/usr/lib/ccache:$PATH"
        echo "=== Build started at $(date) ===" | tee build.log
        echo "Source: Lean's LEDE" | tee -a build.log
        
        # 单核编译最稳定
        make -j1 V=s 2>&1 | tee -a build.log
        
        if [ ${PIPESTATUS[0]} -eq 0 ]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "=== Build SUCCESS ===" | tee -a build.log
        else
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "=== Build FAILED ===" | tee -a build.log
          tail -n 300 build.log
        fi

    - name: Upload debug logs on failure
      if: steps.compile.outputs.status == 'failed'
      uses: actions/upload-artifact@v4
      with:
        name: build-debug-logs
        path: |
          openwrt/build.log
          openwrt/.config
        retention-days: 7

    - name: Collect firmware files
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt
        FW_DIR=$(find bin/targets -type f -name "*.bin" 2>/dev/null | head -1 | xargs dirname)
        if [ -z "$FW_DIR" ]; then
          echo "No firmware found!"
          find bin/targets -type f 2>/dev/null || echo "Empty"
          exit 1
        fi
        mkdir -p ../artifacts
        cp $FW_DIR/*.bin ../artifacts/ 2>/dev/null || true
        cp $FW_DIR/*.img ../artifacts/ 2>/dev/null || true
        cp $FW_DIR/*.tar.gz ../artifacts/ 2>/dev/null || true
        cp $FW_DIR/*.zip ../artifacts/ 2>/dev/null || true
        cp build.log ../artifacts/
        cp .config ../artifacts/config.build.txt
        echo "DATE=$(date +%Y-%m-%d-%H%M)" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      with:
        name: ${{ env.DEVICE_NAME }}-firmware-${{ steps.organize.outputs.DATE }}
        path: artifacts/
        retention-days: 7
        compression-level: 0

    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      with:
        name: ${{ env.DEVICE_NAME }} Firmware ${{ steps.organize.outputs.DATE }}
        tag: ${{ env.DEVICE_NAME }}-${{ steps.organize.outputs.DATE }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: artifacts/*
        allowUpdates: true
        replacesArtifacts: true
        body: |
          ## Nokia XG-140G-MD LEDE 固件
          
          | 项目 | 信息 |
          |------|------|
          | SoC | AIROHA AN7581 (ARM Cortex-A53) |
          | PHY | 达发 EN8811H 2.5G |
          | Flash | 复旦微 FM25G02BI3 |
          | 管理地址 | http://192.168.1.1 |
          | 源码 | Lean's LEDE (coolsnowwolf/lede) |
          
          ### 刷机说明
          1. 下载对应固件文件
          2. 通过路由器升级界面刷入
          3. 首次刷机建议不保留配置

    - name: Debug SSH
      if: github.event.inputs.ssh == 'true'
      uses: mxschmitt/action-tmate@v3
      timeout-minutes: 60
