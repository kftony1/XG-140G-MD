# # .github/workflows/build.yml
name: Build ImmortalWrt Firmware for Nokia XG-140G-MD

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH debug mode'
        required: false
        default: 'false'
  push:
    branches: [ main, master ]
    paths:
      - 'config/.config'
      - '.github/workflows/*.yml'

env:
  # 使用专门支持 AIROHA AN7581 的仓库
  REPO_URL: https://github.com/lwz322/immortalwrt-airoha
  REPO_BRANCH: master
  DEVICE_NAME: Nokia-XG140G-MD
  CONFIG_FILE: config/.config
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo apt clean
        sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android
        df -h

    - name: Prepare build environment
      run: |
        sudo apt update -y
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
          git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfreetype6-dev libgmp3-dev libltdl-dev \
          libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
          mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-pyelftools \
          libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
          vim wget xmlto xxd zlib1g-dev
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone --depth 1 --branch ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt
        cd openwrt

    - name: Apply custom config and files
      run: |
        cd openwrt
        
        # 复制用户 .config 文件
        if [ -f "../${{ env.CONFIG_FILE }}" ]; then
          cp -f "../${{ env.CONFIG_FILE }}" .config
          echo "Custom .config applied."
        else
          echo "Error: .config file not found at ${{ env.CONFIG_FILE }}"
          exit 1
        fi
        
        # ==================== custom.sh 脚本开始 ====================
        echo "Running custom configuration..."
        
        # 创建 files 目录结构
        mkdir -p files/etc/config
        mkdir -p files/etc/board.d
        
        # 写入网络配置
        cat > files/etc/config/network << 'EOF'
config interface 'loopback'
    option ifname 'lo'
    option proto 'static'
    option ipaddr '127.0.0.1'
    option netmask '255.0.0.0'

config interface 'lan'
    option ifname 'eth0'
    option proto 'static'
    option ipaddr '192.168.1.1'
    option netmask '255.255.255.0'
    option ip6assign '60'

config interface 'wan'
    option ifname 'eth1'
    option proto 'dhcp'

config interface 'wan6'
    option ifname 'eth1'
    option proto 'dhcpv6'
EOF
        
        # 写入密码配置
        cat > files/etc/shadow << 'EOF'
root:$1$WnUqCk5R$CvC8R.pJH5tT9qkO7xN5d/:0:0:99999:7:::
daemon:*:0:0:99999:7:::
ftp:*:0:0:99999:7:::
nobody:*:0:0:99999:7:::
EOF
        
        # 写入型号覆盖脚本
        cat > files/etc/board.d/01_override_model << 'EOF'
#!/bin/sh
echo "airoha,an7581-nokia-xg-140g-md" > /tmp/sysinfo/board_name
echo "Nokia XG-140G-MD" > /tmp/sysinfo/model
EOF
        
        # 设置权限
        chmod +x files/etc/board.d/01_override_model
        chmod 644 files/etc/config/network
        chmod 600 files/etc/shadow
        
        echo "Custom configuration completed!"
        # ==================== custom.sh 脚本结束 ====================

    - name: Cache build artifacts
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/.ccache
          openwrt/build_dir
        key: ${{ env.DEVICE_NAME }}-build-${{ hashFiles('openwrt/.config') }}-${{ github.sha }}
        restore-keys: |
          ${{ env.DEVICE_NAME }}-build-${{ hashFiles('openwrt/.config') }}-
          ${{ env.DEVICE_NAME }}-build-

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure and download sources
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \; || true

    - name: Compile firmware
      id: compile
      run: |
        cd openwrt
        export PATH="/usr/lib/ccache:$PATH"
        echo "=== Build started at $(date) ===" | tee build.log
        echo "Using $(nproc) CPU cores"
        
        make -j$(nproc) V=s 2>&1 | tee -a build.log
        
        if [ ${PIPESTATUS[0]} -eq 0 ]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "=== Build completed at $(date) ===" | tee -a build.log
        else
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "=== Build failed at $(date) ===" | tee -a build.log
        fi

    - name: Show error log on failure
      if: steps.compile.outputs.status == 'failed'
      run: |
        cd openwrt
        echo "========== Last 300 lines of build.log =========="
        tail -n 300 build.log
        echo "========== Build directory listing =========="
        ls -la bin/targets/ 2>/dev/null || echo "No firmware output found"

    - name: Collect firmware files
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt
        
        FIRMWARE_DIR=$(find bin/targets -type d -name "*-*" | head -1)
        if [ -z "$FIRMWARE_DIR" ]; then
          echo "Error: No firmware directory found!"
          find bin/targets -type f 2>/dev/null || echo "bin/targets is empty"
          exit 1
        fi
        
        mkdir -p ../artifacts
        
        find "$FIRMWARE_DIR" -type f \( -name "*.bin" -o -name "*.img" -o -name "*.itb" -o -name "*.tar.gz" -o -name "*.elf" -o -name "*.dtb" \) -exec cp {} ../artifacts/ \;
        
        cp build.log ../artifacts/
        cp .config ../artifacts/config.build.txt
        
        echo "Copied firmware files:"
        ls -la ../artifacts/
        
        echo "FIRMWARE_PATH=$(pwd)/$FIRMWARE_DIR" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +%Y-%m-%d-%H%M)" >> $GITHUB_ENV

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      with:
        name: ${{ env.DEVICE_NAME }}-firmware-${{ env.DATE }}
        path: artifacts/
        retention-days: 7
        compression-level: 0
        if-no-files-found: error

    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      with:
        name: ${{ env.DEVICE_NAME }} Firmware ${{ env.DATE }}
        tag: ${{ env.DEVICE_NAME }}-${{ env.DATE }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: artifacts/*
        allowUpdates: true
        replacesArtifacts: true
        body: |
          ## 设备信息
          - **型号**: Nokia XG-140G-MD
          - **SoC**: AIROHA AN7581 (ARM Cortex-A53)
          - **PHY**: 达发 EN8811H 2.5G
          - **Flash**: 复旦微 FM25G02BI3
          - **USB**: USB 3.0 / USB 2.0
          
          ## 固件信息
          - **源码**: lwz322/immortalwrt-airoha (专门支持 AN7581)
          - **编译时间**: ${{ env.DATE }}
          - **管理地址**: http://192.168.1.1
          - **用户名**: root
          - **密码**: (您预设的密码)
          
          ## 刷机说明
          1. 下载对应固件文件
          2. 通过路由器升级界面刷入
          3. 首次刷机建议不保留配置

    - name: Debug SSH (manual trigger only)
      if: github.event.inputs.ssh == 'true'
      uses: mxschmitt/action-tmate@v3
      timeout-minutes: 30
