# .github/workflows/build.yml
name: Build ImmortalWrt Firmware for Nokia XG-140G-MD

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH debug mode'
        required: false
        default: 'false'
  push:
    branches: [ main, master ]
    paths:
      - 'config/.config'
      - 'custom.sh'
      - '.github/workflows/*.yml'

env:
  # 使用专门支持 AIROHA AN7581 的仓库
  REPO_URL: https://github.com/lwz322/immortalwrt-airoha
  REPO_BRANCH: master
  DEVICE_NAME: Nokia-XG140G-MD
  CONFIG_FILE: config/.config
  CUSTOM_SCRIPT: custom.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 480
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo apt clean
        sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android
        df -h

    - name: Prepare build environment
      run: |
        sudo apt update -y
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
          git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfreetype6-dev libgmp3-dev libltdl-dev \
          libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
          mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-pyelftools \
          libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
          vim wget xmlto xxd zlib1g-dev
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone --depth 1 --branch ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt
        cd openwrt

    - name: Set execute permission for custom.sh
      run: |
        if [ -f "${{ env.CUSTOM_SCRIPT }}" ]; then
          chmod +x "${{ env.CUSTOM_SCRIPT }}"
          echo "Execute permission granted to ${{ env.CUSTOM_SCRIPT }}"
        else
          echo "Warning: ${{ env.CUSTOM_SCRIPT }} not found"
        fi

    - name: Apply custom config and scripts
      run: |
        cd openwrt
        
        # 复制用户 .config 文件
        if [ -f "../${{ env.CONFIG_FILE }}" ]; then
          cp -f "../${{ env.CONFIG_FILE }}" .config
          echo "Custom .config applied."
        else
          echo "Error: .config file not found at ${{ env.CONFIG_FILE }}"
          exit 1
        fi
        
        # 运行根目录的 custom.sh 脚本
        if [ -f "../${{ env.CUSTOM_SCRIPT }}" ]; then
          echo "Running custom.sh from repository root..."
          bash "../${{ env.CUSTOM_SCRIPT }}"
          echo "Custom script executed successfully."
        else
          echo "Warning: custom.sh not found at ${{ env.CUSTOM_SCRIPT }}, skipping..."
        fi

    - name: Cache build artifacts
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/.ccache
          openwrt/build_dir
        key: ${{ env.DEVICE_NAME }}-build-${{ hashFiles('openwrt/.config') }}-${{ github.sha }}
        restore-keys: |
          ${{ env.DEVICE_NAME }}-build-${{ hashFiles('openwrt/.config') }}-
          ${{ env.DEVICE_NAME }}-build-

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure and download sources
      run: |
        cd openwrt
        make defconfig
        make download -j4
        find dl -size -1024c -exec rm -f {} \; || true

    - name: Compile firmware (single core -j1 for stability)
      id: compile
      timeout-minutes: 360
      run: |
        cd openwrt
        export PATH="/usr/lib/ccache:$PATH"
        echo "=== Build started at $(date) ===" | tee build.log
        echo "System info:" | tee -a build.log
        echo "CPU cores: $(nproc)" | tee -a build.log
        echo "Memory: $(free -h | grep Mem)" | tee -a build.log
        echo "Disk space: $(df -h / | tail -1)" | tee -a build.log
        
        # 使用单核编译，最稳定，避免资源竞争和死锁
        echo "Starting compilation with -j1 (single core)..." | tee -a build.log
        make -j1 V=s 2>&1 | tee -a build.log
        
        # 检查编译结果
        if [ ${PIPESTATUS[0]} -eq 0 ]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "=== Build completed successfully at $(date) ===" | tee -a build.log
        else
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "=== Build failed at $(date) ===" | tee -a build.log
          echo "Last 100 lines of build.log:" 
          tail -n 100 build.log
        fi

    - name: Show error log on failure
      if: steps.compile.outputs.status == 'failed'
      run: |
        cd openwrt
        echo "========== Last 500 lines of build.log =========="
        tail -n 500 build.log
        echo "========== Firmware directory listing =========="
        ls -la bin/targets/ 2>/dev/null || echo "No firmware output found"
        echo "========== Check for common errors =========="
        grep -i "error\|failed\|missing" build.log | tail -n 50 || echo "No error patterns found"

    - name: Collect firmware files
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt
        
        # 查找固件目录
        FIRMWARE_DIR=$(find bin/targets -type d -name "*-*" | head -1)
        if [ -z "$FIRMWARE_DIR" ]; then
          echo "Error: No firmware directory found!"
          find bin/targets -type f 2>/dev/null || echo "bin/targets is empty"
          exit 1
        fi
        
        mkdir -p ../artifacts
        
        # 复制固件文件
        find "$FIRMWARE_DIR" -type f \( -name "*.bin" -o -name "*.img" -o -name "*.itb" -o -name "*.tar.gz" -o -name "*.elf" -o -name "*.dtb" \) -exec cp {} ../artifacts/ \;
        
        # 复制编译日志和配置
        cp build.log ../artifacts/
        cp .config ../artifacts/config.build.txt
        
        # 列出复制的文件
        echo "Copied firmware files:"
        ls -la ../artifacts/
        
        echo "FIRMWARE_PATH=$(pwd)/$FIRMWARE_DIR" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +%Y-%m-%d-%H%M)" >> $GITHUB_ENV

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      with:
        name: ${{ env.DEVICE_NAME }}-firmware-${{ env.DATE }}
        path: artifacts/
        retention-days: 7
        compression-level: 0
        if-no-files-found: error

    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      with:
        name: ${{ env.DEVICE_NAME }} Firmware ${{ env.DATE }}
        tag: ${{ env.DEVICE_NAME }}-${{ env.DATE }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: artifacts/*
        allowUpdates: true
        replacesArtifacts: true
        body: |
          ## 设备信息
          - **型号**: Nokia XG-140G-MD
          - **SoC**: AIROHA AN7581 (ARM Cortex-A53)
          - **PHY**: 达发 EN8811H 2.5G
          - **Flash**: 复旦微 FM25G02BI3
          - **USB**: USB 3.0 / USB 2.0
          
          ## 固件信息
          - **源码**: lwz322/immortalwrt-airoha (专门支持 AN7581)
          - **编译时间**: ${{ env.DATE }}
          - **管理地址**: http://192.168.1.1
          
          ## 刷机说明
          1. 下载对应固件文件
          2. 通过路由器升级界面刷入
          3. 首次刷机建议不保留配置

    - name: Debug SSH (manual trigger only)
      if: github.event.inputs.ssh == 'true'
      uses: mxschmitt/action-tmate@v3
      timeout-minutes: 30
