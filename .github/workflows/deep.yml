# .github/workflows/build.yml
name: Build ImmortalWrt Firmware for Nokia XG-140G-MD

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH debug mode'
        required: false
        default: 'false'
  push:
    branches: [ main, master ]
    paths:
      - 'config/.config'
      - 'custom.sh'
      - '.github/workflows/*.yml'

env:
  REPO_URL: https://github.com/lwz322/immortalwrt-airoha
  REPO_BRANCH: master
  DEVICE_NAME: Nokia-XG140G-MD
  CONFIG_FILE: config/.config
  CUSTOM_SCRIPT: custom.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 480
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo apt clean
        sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android
        df -h

    - name: Prepare build environment
      run: |
        sudo apt update -y
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
          git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfreetype6-dev libgmp3-dev libltdl-dev \
          libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
          mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-pyelftools \
          libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
          vim wget xmlto xxd zlib1g-dev
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone --depth 1 --branch ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt
        cd openwrt

    - name: Set execute permission for custom.sh
      run: |
        if [ -f "${{ env.CUSTOM_SCRIPT }}" ]; then
          chmod +x "${{ env.CUSTOM_SCRIPT }}"
          echo "Execute permission granted to ${{ env.CUSTOM_SCRIPT }}"
        else
          echo "Warning: ${{ env.CUSTOM_SCRIPT }} not found"
        fi

    - name: Apply custom config and scripts
      run: |
        cd openwrt
        
        if [ -f "../${{ env.CONFIG_FILE }}" ]; then
          cp -f "../${{ env.CONFIG_FILE }}" .config
          echo "Custom .config applied."
        else
          echo "Error: .config file not found"
          exit 1
        fi
        
        if [ -f "../${{ env.CUSTOM_SCRIPT }}" ]; then
          echo "Running custom.sh..."
          bash "../${{ env.CUSTOM_SCRIPT }}"
        fi

    - name: Cache build artifacts
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/.ccache
          openwrt/build_dir
        key: ${{ env.DEVICE_NAME }}-build-${{ hashFiles('openwrt/.config') }}-${{ github.sha }}
        restore-keys: |
          ${{ env.DEVICE_NAME }}-build-

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure and download sources
      run: |
        cd openwrt
        rm -f .config.old
        make defconfig
        make download -j4
        find dl -size -1024c -exec rm -f {} \; || true

    - name: Clean previous build (if stuck)
      run: |
        cd openwrt
        # 如果上次编译卡住，清理可能有问题的包
        if [ -f build.log ]; then
          echo "Previous build log found, checking for stuck..."
          if grep -q "erandom.lo" build.log; then
            echo "Found stuck at erandom.lo, cleaning..."
            rm -rf build_dir/target-*/*/erandom* 2>/dev/null || true
          fi
        fi

    - name: Compile firmware with timeout protection
      id: compile
      timeout-minutes: 300
      run: |
        cd openwrt
        export PATH="/usr/lib/ccache:$PATH"
        
        echo "=== Build started at $(date) ===" | tee build.log
        echo "System info:" | tee -a build.log
        echo "CPU cores: $(nproc)" | tee -a build.log
        echo "Memory: $(free -h | grep Mem)" | tee -a build.log
        
        # 使用 timeout 命令，防止单个命令卡死
        echo "Starting compilation with -j1..."
        timeout 280m make -j1 V=s 2>&1 | tee -a build.log
        
        # 检查是否超时
        if [ ${PIPESTATUS[0]} -eq 124 ]; then
          echo "status=timeout" >> $GITHUB_OUTPUT
          echo "=== Build TIMEOUT at $(date) ===" | tee -a build.log
          exit 1
        elif [ ${PIPESTATUS[0]} -eq 0 ]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "=== Build SUCCESS at $(date) ===" | tee -a build.log
        else
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "=== Build FAILED at $(date) ===" | tee -a build.log
        fi

    - name: Show error log on failure
      if: steps.compile.outputs.status != 'success'
      run: |
        cd openwrt
        echo "========== Last 500 lines =========="
        tail -n 500 build.log
        echo "========== Error patterns =========="
        grep -E "error:|Error:|failed:|Missing:" build.log | tail -n 30 || echo "No errors found"

    - name: Collect firmware files
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt
        FIRMWARE_DIR=$(find bin/targets -type d -name "*-*" | head -1)
        if [ -z "$FIRMWARE_DIR" ]; then
          echo "No firmware directory found!"
          exit 1
        fi
        mkdir -p ../artifacts
        find "$FIRMWARE_DIR" -type f \( -name "*.bin" -o -name "*.img" -o -name "*.itb" -o -name "*.tar.gz" \) -exec cp {} ../artifacts/ \;
        cp build.log ../artifacts/
        cp .config ../artifacts/config.build.txt
        echo "DATE=$(date +%Y-%m-%d-%H%M)" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      with:
        name: ${{ env.DEVICE_NAME }}-firmware-${{ env.DATE }}
        path: artifacts/
        retention-days: 7
        compression-level: 0

    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      with:
        name: ${{ env.DEVICE_NAME }} Firmware ${{ env.DATE }}
        tag: ${{ env.DEVICE_NAME }}-${{ env.DATE }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: artifacts/*
        allowUpdates: true
        replacesArtifacts: true
        body: |
          ## 设备信息
          - **型号**: Nokia XG-140G-MD
          - **SoC**: AIROHA AN7581 (ARM Cortex-A53)
          - **PHY**: 达发 EN8811H 2.5G
          - **管理地址**: http://192.168.1.1

    - name: Debug SSH
      if: github.event.inputs.ssh == 'true'
      uses: mxschmitt/action-tmate@v3
      timeout-minutes: 60
