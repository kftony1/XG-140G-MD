# .github/workflows/build-lede.yml
name: Build LEDE Firmware for AIROHA AN7581

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'config/.config'
      - 'patches/**'
      - '.github/workflows/*.yml'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: config/.config
  PATCHES_DIR: patches
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo apt clean
        sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android

    - name: Prepare build environment
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone LEDE source
      run: |
        git clone --depth 1 --branch ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} lede
        cd lede

    - name: Create custom network and shadow files
      run: |
        cd lede
        mkdir -p files/etc/config
        mkdir -p files/etc
        # 写入 network 配置
        cat > files/etc/config/network << 'EOF'
config interface 'loopback'
    option ifname 'lo'
    option proto 'static'
    option ipaddr '127.0.0.1'
    option netmask '255.0.0.0'

config interface 'lan'
    option ifname 'eth0'
    option proto 'static'
    option ipaddr '192.168.1.1'
    option netmask '255.255.255.0'
    option ip6assign '60'

config interface 'wan'
    option ifname 'eth1'
    option proto 'dhcp'

config interface 'wan6'
    option ifname 'eth1'
    option proto 'dhcpv6'
EOF
        # 写入 shadow 配置
        cat > files/etc/shadow << 'EOF'
root:$1$WnUqCk5R$CvC8R.pJH5tT9qkO7xN5d/:0:0:99999:7:::
daemon:*:0:0:99999:7:::
ftp:*:0:0:99999:7:::
nobody:*:0:0:99999:7:::
EOF
        echo "Custom network and shadow files created."

    - name: Copy custom config and apply patches
      run: |
        cd lede
        # 复制用户提供的 .config
        cp ../${{ env.CONFIG_FILE }} .config
        # 应用补丁（如有）
        if [ -d "../${{ env.PATCHES_DIR }}" ]; then
          for patch in ../${{ env.PATCHES_DIR }}/*.patch; do
            echo "Applying patch: $patch"
            patch -p1 < "$patch" || { echo "Patch failed: $patch"; exit 1; }
          done
        fi

    - name: Update feeds
      run: |
        cd lede
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Finalize configuration
      run: |
        cd lede
        make defconfig

    - name: Cache downloads and ccache
      uses: actions/cache@v3
      with:
        path: |
          lede/dl
          lede/.ccache
        key: ${{ runner.os }}-lede-${{ hashFiles('lede/.config') }}
        restore-keys: |
          ${{ runner.os }}-lede-

    - name: Download package sources
      run: |
        cd lede
        make download -j$(nproc) V=s
        find dl -size -1024c -exec ls -l {} \; || true

    - name: Compile firmware (save full log)
      run: |
        cd lede
        export PATH="/usr/lib/ccache:$PATH"
        echo "=== Build started at $(date) ===" | tee build.log
        make -j$(nproc) V=s 2>&1 | tee -a build.log
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "Build failed! Check build.log for details."
          exit 1
        fi
        echo "=== Build completed at $(date) ===" | tee -a build.log

    - name: Collect firmware files
      run: |
        cd lede
        find bin/targets/ -type f \( -name "*.bin" -o -name "*.img" -o -name "*.itb" -o -name "*.tar.gz" -o -name "*.elf" \) > ../firmware_list.txt
        if [ ! -s ../firmware_list.txt ]; then
          echo "No firmware files found!"
          exit 1
        fi
        mkdir -p ../artifacts
        cp $(cat ../firmware_list.txt) ../artifacts/
        cp build.log ../artifacts/build.log
        cp .config ../artifacts/config.build

    - name: Upload artifacts (firmware + logs)
      uses: actions/upload-artifact@v4
      with:
        name: lede-an7581
        path: artifacts/
        retention-days: 7
        if-no-files-found: error
