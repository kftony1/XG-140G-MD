# Nokia XG-140G-MD (AN7581) 专用云编译 - 无错最终版
name: Build XG-140G-MD ImmortalWrt

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'ImmortalWrt 分支'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - openwrt-23.05

permissions:
  contents: write
  actions: read
  packages: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: ${{ github.event.inputs.branch }}
  CONFIG_FILE: config/.config
  CUSTOM_SH: custom.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  DEVICE_TARGET: airoha
  DEVICE_SUBCMD: an7581

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 1400

    steps:
    - name: 检查仓库
      uses: actions/checkout@v4

    # ==================== 环境安装（已修复所有报错）====================
    - name: 初始化编译环境
      run: |
        sudo sed -i "s/^#\s*deb-src/deb-src/g" /etc/apt/sources.list
        sudo apt update -y
        sudo apt upgrade -y
        sudo apt remove -y needrestart
        sudo apt autoremove -y
        
        # 修复依赖包，无错误版本
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
        git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
        libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev \
        libtool libyaml-dev libz-dev lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf \
        python3-pip python3-pyelftools qemu-utils rsync scons squashfs-tools subversion swig texinfo \
        uglifyjs unzip upx-ucl vim wget xmlto xxd zlib1g-dev

        sudo timedatectl set-timezone "$TZ"
        sudo swapoff -a
        sudo fallocate -l 16G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        df -h

    # ==================== 缓存 ====================
    - name: 缓存源码与依赖
      uses: actions/cache@v4
      with:
        path: |
          openwrt/
          !openwrt/.git/
          !openwrt/tmp/
          !openwrt/build_dir/
          !openwrt/staging_dir/
        key: ${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBCMD }}

    # ==================== 拉取源码 ====================
    - name: 拉取 ImmortalWrt 源码
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # ==================== 加载配置 ====================
    - name: 加载 .config
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        cd openwrt
        make defconfig

    # ==================== 下载依赖 ====================
    - name: 下载安装包
      run: |
        cd openwrt
        make download -j$(nproc)
        find dl -size -1024c -exec rm -f {} \;

    # ==================== 自定义脚本 ====================
    - name: 运行自定义配置
      run: |
        chmod +x $CUSTOM_SH
        cd openwrt
        ../$CUSTOM_SH

    # ==================== 编译 ====================
    - name: 开始编译固件
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    # ==================== 整理固件（已修复目录）====================
    - name: 整理固件文件
      id: organize
      if: success()
      run: |
        cd openwrt/bin/targets/${{ env.DEVICE_TARGET }}/${{ env.DEVICE_SUBCMD }}
        rm -rf packages
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        ls -la

    # ==================== 上传 ====================
    - name: 上传固件到 Actions
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: 固件-XG-140G-MD-${{ env.REPO_BRANCH }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: 上传到 Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        name: Nokia XG-140G-MD 固件
        tag_name: build-${{ github.run_number }}
        files: ${{ env.FIRMWARE_PATH }}/*
        body: |
          设备：Nokia XG-140G-MD (AN7581 换壳)
          驱动：xg-040g-md 兼容
          显示：XG-140G-MD
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
