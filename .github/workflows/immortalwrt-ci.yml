name: Build XG-140G-MD ImmortalWrt

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch'
        required: true
        default: 'master'

permissions:
  contents: write
  actions: read

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: ${{ github.event.inputs.branch }}
  CONFIG_FILE: config/.config
  CUSTOM_SH: custom.sh
  DEVICE_TARGET: airoha
  DEVICE_SUBCMD: an7581
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 初始化环境（彻底屏蔽弹窗 + 无错依赖）
        run: |
          # ========== 永久禁用 needrestart 弹窗 ==========
          export DEBIAN_FRONTEND=noninteractive
          echo "needrestart needrestart/auto-restart-services boolean false" | sudo debconf-set-selections
          echo "needrestart needrestart/auto-restart-sessions boolean false" | sudo debconf-set-selections
          sudo apt-get remove -y needrestart
          sudo apt-get purge -y needrestart
          
          # ========== 更新软件源 ==========
          sudo apt update -yq
          
          # ========== 安装纯稳定依赖（无 libncursesw6-dev）==========
          sudo apt install -yq \
            build-essential ccache curl flex g++-multilib gcc-multilib git \
            libncurses5-dev libssl-dev libelf-dev libfuse-dev device-tree-compiler \
            cmake make python3 python3-pip unzip wget cpio rsync patch

      - name: 缓存下载目录
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/.ccache
          key: ${{ env.REPO_BRANCH }}-airoha-an7581

      - name: 拉取源码
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载.config
        run: |
          cp $CONFIG_FILE openwrt/.config
          cd openwrt
          make defconfig

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 运行自定义脚本
        run: |
          chmod +x $CUSTOM_SH
          cd openwrt
          ../$CUSTOM_SH

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 整理固件
        id: organize
        run: |
          cd openwrt/bin/targets/airoha/an7581
          rm -rf packages
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
          ls -la

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: XG-140G-MD-固件
          path: ${{ env.FIRMWARE_PATH }}

      - name: 上传到Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: ${{ env.FIRMWARE_PATH }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
