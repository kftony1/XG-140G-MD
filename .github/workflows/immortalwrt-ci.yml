name: Build XG-140G-MD

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 初始化环境（零弹窗·零报错）
        run: |
          # 强制关闭所有交互
          export DEBIAN_FRONTEND=noninteractive

          # 彻底杀死 needrestart（永不弹窗）
          sudo apt -y purge needrestart
          sudo apt -y autoremove
          sudo apt -y autoclean

          # 最小化安装编译依赖
          sudo apt update -yq
          sudo apt install -yq \
            build-essential ccache libncurses5-dev libssl-dev \
            git curl unzip bison flex device-tree-compiler \
            libelf-dev make cmake

      - name: 下载源码
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git --depth=1 openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 应用配置
        run: |
          cp config/.config openwrt/
          cp custom.sh openwrt/
          cd openwrt
          chmod +x custom.sh && ./custom.sh
          make defconfig

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 整理固件
        run: |
          cd openwrt/bin/targets/airoha/an7581
          rm -rf packages
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: 固件
          path: ${{ env.FIRMWARE_PATH }}

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: ${{ env.FIRMWARE_PATH }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
