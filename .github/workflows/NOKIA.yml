name: Build ImmortalWrt for Nokia XG-140G-MD

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/**'
      - '**.yml'
      - '**.yaml'
      - 'config/**'
      - 'etc/**'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
        df -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
          file wget time patch libelf-dev bc subversion

    # ==================== 缓存配置 ====================
    - name: Cache ImmortalWrt source
      uses: actions/cache@v4
      id: cache-source
      with:
        path: immortalwrt
        key: ${{ runner.os }}-immortalwrt-source-${{ hashFiles('immortalwrt/.git/HEAD') }}
        restore-keys: |
          ${{ runner.os }}-immortalwrt-source-

    - name: Cache downloads
      uses: actions/cache@v4
      id: cache-downloads
      with:
        path: immortalwrt/dl
        key: ${{ runner.os }}-immortalwrt-dl-${{ hashFiles('immortalwrt/dl/*') }}
        restore-keys: |
          ${{ runner.os }}-immortalwrt-dl-

    - name: Cache build artifacts
      uses: actions/cache@v4
      id: cache-build
      with:
        path: |
          immortalwrt/build_dir
          immortalwrt/staging_dir
          immortalwrt/tmp
        key: ${{ runner.os }}-immortalwrt-build-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-immortalwrt-build-

    - name: Clone ImmortalWrt source
      if: steps.cache-source.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/immortalwrt/immortalwrt.git
        cd immortalwrt
        git checkout openwrt-24.10

    - name: Copy config files from repository
      run: |
        cd immortalwrt
        
        # 复制 .config 编译配置文件
        cp ../config/.config ./.config
        
        # 复制网口配置文件
        mkdir -p files/etc/config
        cp ../etc/config/network files/etc/config/network
        
        # 复制密码配置文件
        mkdir -p files/etc
        cp ../etc/shadow files/etc/shadow
        
        echo "Config files copied successfully:"
        echo "  - .config"
        echo "  - files/etc/config/network"
        echo "  - files/etc/shadow"

    - name: Update feeds
      run: |
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Update config
      run: |
        cd immortalwrt
        make defconfig
        make oldconfig

    - name: Download sources
      run: |
        cd immortalwrt
        make download -j4

    - name: Build firmware
      run: |
        cd immortalwrt
        make -j$(nproc) V=s 2>&1 | tee build.log

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: immortalwrt-an7581-firmware
        path: |
          immortalwrt/bin/targets/airoha/an7581/*.bin
          immortalwrt/bin/targets/airoha/an7581/*.img
          immortalwrt/bin/targets/airoha/an7581/*.tar.gz
          immortalwrt/build.log
        retention-days: 7
