name: Build OpenWrt (Ansuel) for Nokia XG-140G-MD

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout Ansuel OpenWrt source (shallow)
        uses: actions/checkout@v4
        with:
          repository: Ansuel/openwrt
          ref: openwrt-24.10-airoha-an7581-stable
          path: openwrt
          fetch-depth: 1

      - name: Checkout config repository
        uses: actions/checkout@v4
        with:
          path: openwrt/custom
          fetch-depth: 1

      - name: Merge .config and custom files
        working-directory: openwrt
        run: |
          cp custom/.config . || exit 1
          cp -r custom/files . 2>/dev/null || true

      - name: Disable problematic firmware packages
        working-directory: openwrt
        run: |
          sed -i '/CONFIG_PACKAGE_linux-firmware=y/d' .config
          sed -i '/CONFIG_PACKAGE_iwlwifi-firmware/d' .config
          sed -i '/CONFIG_PACKAGE_amdgpu-firmware/d' .config
          echo "# CONFIG_PACKAGE_linux-firmware is not set" >> .config
          grep -q "CONFIG_TARGET_airoha=y" .config || exit 1

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-ansuel-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-ccache-ansuel-

      - name: Setup download cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-ansuel-${{ hashFiles('openwrt/.config') }}
          restore-keys: ${{ runner.os }}-dl-ansuel-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends --fix-missing \
            build-essential flex bison g++ gawk gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget ccache time bc cpio perl-modules python3 patch libelf-dev \
            liblzma-dev locales

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build
        working-directory: openwrt
        run: |
          make defconfig || FORCE=1 make defconfig
          echo "===== Target config ====="
          grep -E "CONFIG_TARGET_(airoha|BOARD|DEVICE)" .config

      - name: Download sources (with retry)
        working-directory: openwrt
        run: |
          for i in 1 2 3; do
            echo "Download attempt $i"
            make download -j1 && break
            [ $i -eq 3 ] && exit 1
            sleep 5
          done

      - name: Compile toolchain (quiet but save full log)
        working-directory: openwrt
        run: |
          make toolchain/compile -j1 V=sc 2>&1 | tee toolchain.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Toolchain failed, cleaning and retrying..."
            rm -rf staging_dir/toolchain-* build_dir/toolchain-*
            make toolchain/compile -j1 V=sc 2>&1 | tee toolchain_retry.log
          fi

      - name: Compile firmware (quiet, save full log)
        working-directory: openwrt
        env:
          CCACHE_DIR: ~/.ccache
          PATH: "/usr/lib/ccache:$PATH"
        run: |
          echo "Starting full compilation at $(date)"
          make -j$(nproc) V=sc 2>&1 | tee compile.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "First compilation failed, cleaning and retrying..."
            make clean
            make -j$(nproc) V=sc 2>&1 | tee compile_retry.log
          fi
          echo "Compilation finished at $(date)"

      - name: Save last 500 lines of compile log (if truncated)
        if: always()
        working-directory: openwrt
        run: |
          tail -500 compile.log > compile_tail.log 2>/dev/null || true
          tail -500 compile_retry.log > compile_retry_tail.log 2>/dev/null || true

      - name: Prepare artifacts
        if: always()
        working-directory: openwrt
        run: |
          mkdir -p artifacts
          FW_DIR="bin/targets/airoha/an7581"
          if [ -d "$FW_DIR" ]; then
            cp $FW_DIR/*.bin $FW_DIR/*.img $FW_DIR/sha256sums artifacts/ 2>/dev/null || true
            cd artifacts && sha256sum * > checksums.txt 2>/dev/null || true
          fi

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ansuel-24.10-nokia-xg140gmd
          path: openwrt/artifacts/
          retention-days: 7

      - name: Upload full build logs (no truncation)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-ansuel
          path: |
            openwrt/compile.log
            openwrt/compile_retry.log
            openwrt/toolchain.log
            openwrt/toolchain_retry.log
            openwrt/compile_tail.log
            openwrt/compile_retry_tail.log
            openwrt/.config
          retention-days: 7
