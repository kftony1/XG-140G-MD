name: Build OpenWrt for Nokia XG-140G-MD (24.10 + ImmortalWrt)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    env:
      OPENWRT_VERSION: "openwrt-24.10"

    steps:
      - name: Checkout OpenWrt source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ env.OPENWRT_VERSION }}
          path: openwrt

      - name: Checkout custom config and files
        uses: actions/checkout@v4
        with:
          path: openwrt/custom

      - name: Merge .config and files/
        working-directory: openwrt
        run: |
          cp custom/.config . || { echo "❌ .config not found in repository root"; exit 1; }
          cp -r custom/files . 2>/dev/null || true

      - name: Verify .config content after copy
        working-directory: openwrt
        run: |
          echo "===== First 10 lines of .config ====="
          head -10 .config
          echo "===== Checking for airoha target ====="
          grep -q "CONFIG_TARGET_airoha=y" .config || { echo "❌ airoha target missing in .config"; exit 1; }

      - name: Setup ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ env.OPENWRT_VERSION }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.OPENWRT_VERSION }}-

      - name: Setup source download cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ env.OPENWRT_VERSION }}-${{ hashFiles('openwrt/.config') }}
          restore-keys: |
            ${{ runner.os }}-dl-${{ env.OPENWRT_VERSION }}-

      - name: Install dependencies (full build environment)
        run: |
          sudo apt update
          sudo apt install -y \
            asciidoc \
            bash \
            bc \
            binutils \
            bison \
            build-essential \
            bzip2 \
            ccache \
            clang \
            coreutils \
            cpio \
            diffstat \
            docker.io \
            fastjar \
            flex \
            g++ \
            gawk \
            gcc \
            gettext \
            git \
            java-propose-classpath \
            kmod \
            libc6 \
            libc6-dev \
            libelf-dev \
            liblzma-dev \
            libncurses-dev \
            libncurses5-dev \
            libssl-dev \
            locales \
            make \
            mkisofs \
            nano \
            ncurses-dev \
            openssl \
            patch \
            perl-modules \
            pkgconf \
            python3 \
            python3-distutils \
            python3-pip \
            python3-venv \
            python2.7-dev \
            rsync \
            ruby \
            ruby-dev \
            sdcc \
            subversion \
            swig \
            time \
            uglifyjs \
            unzip \
            upx \
            wget \
            xsltproc \
            zlib1g-dev

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Validate and expand .config
        working-directory: openwrt
        run: |
          make defconfig
          grep -q "CONFIG_TARGET_airoha=y" .config || { echo "❌ airoha target lost after defconfig"; exit 1; }

      - name: Show target configuration summary
        working-directory: openwrt
        run: |
          echo "===== Target Configuration ====="
          grep -E "^CONFIG_TARGET_(airoha|BOARD|DEVICE)" .config

      - name: Download all sources
        working-directory: openwrt
        run: make download -j$(nproc)

      - name: Compile firmware
        working-directory: openwrt
        env:
          CCACHE_DIR: ~/.ccache
          PATH: "/usr/lib/ccache:$PATH"
        run: |
          echo "Starting compilation at $(date)"
          make -j$(nproc) V=s
          echo "Compilation finished at $(date)"

      - name: Prepare artifacts
        if: always()
        working-directory: openwrt
        run: |
          mkdir -p artifacts
          FW_DIR="bin/targets/airoha/an7581"
          if [ -d "$FW_DIR" ]; then
            cp $FW_DIR/*.bin $FW_DIR/*.img $FW_DIR/sha256sums artifacts/ 2>/dev/null || true
            for f in artifacts/*.bin; do
              [ -e "$f" ] && mv "$f" "artifacts/openwrt-nokia-xg-140g-md-$(date +%Y%m%d).bin"
            done
            for f in artifacts/*.img; do
              [ -e "$f" ] && mv "$f" "artifacts/openwrt-nokia-xg-140g-md-$(date +%Y%m%d).img"
            done
            cd artifacts && sha256sum * > checksums.txt && cd ..
          else
            echo "⚠️ No firmware generated! Check logs."
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-nokia-xg140gmd-firmware-24.10
          path: openwrt/artifacts/
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-24.10
          path: |
            openwrt/logs/
            openwrt/.config
          retention-days: 7
