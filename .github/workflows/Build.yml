name: Build OpenWrt for Nokia XG-140G-MD (24.10 + ImmortalWrt)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    env:
      OPENWRT_VERSION: "openwrt-24.10"

    steps:
      - name: Checkout OpenWrt source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ env.OPENWRT_VERSION }}
          path: openwrt

      - name: Checkout custom config and files
        uses: actions/checkout@v4
        with:
          path: openwrt/custom

      - name: Merge .config and files/
        working-directory: openwrt
        run: |
          cp custom/.config . || { echo "❌ .config not found in repository root"; exit 1; }
          cp -r custom/files . 2>/dev/null || true

      - name: Verify .config content
        working-directory: openwrt
        run: |
          head -10 .config
          grep -q "CONFIG_TARGET_airoha=y" .config || exit 1

      - name: Setup ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ env.OPENWRT_VERSION }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.OPENWRT_VERSION }}-

      - name: Setup source download cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ env.OPENWRT_VERSION }}-${{ hashFiles('openwrt/.config') }}
          restore-keys: |
            ${{ runner.os }}-dl-${{ env.OPENWRT_VERSION }}-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3-distutils \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            ccache \
            time \
            bc \
            cpio \
            perl-modules \
            python3 \
            patch \
            libelf-dev \
            liblzma-dev \
            locales
          # 关键：安装 perl-ipc-cmd（如果 apt 没有，则用 cpan）
          sudo apt install -y perl-ipc-cmd || { sudo apt install -y cpanminus && sudo cpanm IPC::Cmd; }

      - name: Run prerequisite check and save log
        working-directory: openwrt
        run: |
          make prereq 2>&1 | tee prereq.log
          if grep -q "missing" prereq.log; then
            echo "===== Missing dependencies detected ====="
            cat prereq.log
            exit 1
          fi

      - name: Upload prereq log if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prereq-log
          path: openwrt/prereq.log

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Validate and expand .config
        working-directory: openwrt
        run: |
          make defconfig
          grep -q "CONFIG_TARGET_airoha=y" .config || exit 1

      - name: Show target summary
        working-directory: openwrt
        run: grep -E "^CONFIG_TARGET_(airoha|BOARD|DEVICE)" .config

      - name: Download all sources
        working-directory: openwrt
        run: make download -j$(nproc)

      - name: Compile firmware
        working-directory: openwrt
        env:
          CCACHE_DIR: ~/.ccache
          PATH: "/usr/lib/ccache:$PATH"
        run: |
          echo "Starting compilation at $(date)"
          make -j$(nproc) V=s
          echo "Compilation finished at $(date)"

      - name: Prepare artifacts
        if: always()
        working-directory: openwrt
        run: |
          mkdir -p artifacts
          FW_DIR="bin/targets/airoha/an7581"
          if [ -d "$FW_DIR" ]; then
            cp $FW_DIR/*.bin $FW_DIR/*.img $FW_DIR/sha256sums artifacts/ 2>/dev/null || true
            for f in artifacts/*.bin; do
              [ -e "$f" ] && mv "$f" "artifacts/openwrt-nokia-xg-140g-md-$(date +%Y%m%d).bin"
            done
            for f in artifacts/*.img; do
              [ -e "$f" ] && mv "$f" "artifacts/openwrt-nokia-xg-140g-md-$(date +%Y%m%d).img"
            done
            cd artifacts && sha256sum * > checksums.txt && cd ..
          else
            echo "⚠️ No firmware generated! Check logs."
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-nokia-xg140gmd-firmware-24.10
          path: openwrt/artifacts/
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-24.10
          path: |
            openwrt/logs/
            openwrt/.config
          retention-days: 7
