name: Build OpenWrt for Nokia XG-140G-MD (23.05 + ImmortalWrt)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    env:
      OPENWRT_VERSION: "openwrt-23.05"

    steps:
      - name: Checkout OpenWrt source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ env.OPENWRT_VERSION }}
          path: openwrt

      - name: Checkout custom config and files
        uses: actions/checkout@v4
        with:
          path: openwrt/custom

      - name: Merge .config and files/
        working-directory: openwrt
        run: |
          cp custom/.config . || { echo "❌ .config not found in repository root"; exit 1; }
          cp -r custom/files . 2>/dev/null || true

      - name: Verify .config content after copy
        working-directory: openwrt
        run: |
          echo "===== First 10 lines of .config ====="
          head -10 .config
          echo "===== Checking for airoha target ====="
          grep -q "CONFIG_TARGET_airoha=y" .config || { echo "❌ airoha target missing in .config"; exit 1; }

      - name: Enable firmware image generation (remove source-only)
        working-directory: openwrt
        run: |
          sed -i 's/\(nokia-xg-040g-md.*\)source-only/\1/' target/linux/airoha/image/an7581.mk || true
          echo 'CONFIG_TARGET_IMAGES_GZIP=y' >> .config
          echo 'CONFIG_TARGET_ROOTFS_SQUASHFS=y' >> .config
          echo 'CONFIG_CCACHE=y' >> .config

      - name: Setup ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ env.OPENWRT_VERSION }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.OPENWRT_VERSION }}-

      - name: Setup source download cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ env.OPENWRT_VERSION }}-${{ hashFiles('openwrt/.config') }}
          restore-keys: |
            ${{ runner.os }}-dl-${{ env.OPENWRT_VERSION }}-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget ccache time

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Validate and expand .config
        working-directory: openwrt
        run: |
          make defconfig
          grep -q "CONFIG_TARGET_airoha=y" .config || { echo "❌ airoha target lost after defconfig"; exit 1; }

      - name: Show target configuration summary
        working-directory: openwrt
        run: |
          echo "===== Target Configuration ====="
          grep -E "^CONFIG_TARGET_(airoha|BOARD|DEVICE)" .config
          echo "===== source-only status ====="
          grep "nokia-xg-040g-md" target/linux/airoha/image/an7581.mk || echo "source-only removed"

      - name: Download all sources
        working-directory: openwrt
        run: make download -j$(nproc)

      - name: Compile firmware
        working-directory: openwrt
        env:
          CCACHE_DIR: ~/.ccache
          PATH: "/usr/lib/ccache:$PATH"
        run: |
          echo "Starting compilation at $(date)"
          make -j$(nproc) V=s
          echo "Compilation finished at $(date)"

      - name: Prepare artifacts
        if: always()
        working-directory: openwrt
        run: |
          mkdir -p artifacts
          FW_DIR="bin/targets/airoha/an7581"
          if [ -d "$FW_DIR" ]; then
            cp $FW_DIR/*.bin $FW_DIR/*.img $FW_DIR/sha256sums artifacts/ 2>/dev/null || true
            for f in artifacts/*.bin; do
              [ -e "$f" ] && mv "$f" "artifacts/openwrt-nokia-xg-140g-md-$(date +%Y%m%d).bin"
            done
            for f in artifacts/*.img; do
              [ -e "$f" ] && mv "$f" "artifacts/openwrt-nokia-xg-140g-md-$(date +%Y%m%d).img"
            done
            cd artifacts && sha256sum * > checksums.txt && cd ..
          else
            echo "⚠️ No firmware generated! Check logs."
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-nokia-xg140gmd-firmware-23.05
          path: openwrt/artifacts/
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-23.05
          path: |
            openwrt/logs/
            openwrt/.config
            openwrt/target/linux/airoha/image/an7581.mk
          retention-days: 7

      - name: Collect logs on failure
        if: failure()
        working-directory: openwrt
        run: |
          mkdir -p logs
          find . -name "*.log" -exec cp {} logs/ \; 2>/dev/null || true
          cp .config logs/config.txt || true
