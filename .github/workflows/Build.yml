name: Build ImmortalWrt for Nokia XG-140G-MD (24.10)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    env:
      OPENWRT_VERSION: "openwrt-24.10"

    steps:
      - name: Checkout ImmortalWrt source
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: ${{ env.OPENWRT_VERSION }}
          path: openwrt

      - name: Checkout custom config and files
        uses: actions/checkout@v4
        with:
          path: openwrt/custom

      - name: Merge .config and files/
        working-directory: openwrt
        run: |
          cp custom/.config . || exit 1
          cp -r custom/files . 2>/dev/null || true

      - name: Verify .config content
        working-directory: openwrt
        run: |
          head -5 .config
          grep -q "CONFIG_TARGET_airoha=y" .config || exit 1

      - name: Setup ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ env.OPENWRT_VERSION }}-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-ccache-${{ env.OPENWRT_VERSION }}-

      - name: Setup source download cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ env.OPENWRT_VERSION }}-${{ hashFiles('openwrt/.config') }}
          restore-keys: ${{ runner.os }}-dl-${{ env.OPENWRT_VERSION }}-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget ccache time bc cpio perl-modules python3 patch libelf-dev liblzma-dev locales

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Validate and expand .config (force)
        working-directory: openwrt
        run: |
          FORCE=1 make defconfig

      - name: Download all sources
        working-directory: openwrt
        run: make download -j$(nproc)

      - name: Compile firmware
        working-directory: openwrt
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          FORCE=1 make -j$(nproc) V=s

      - name: Prepare artifacts
        if: always()
        working-directory: openwrt
        run: |
          mkdir -p artifacts
          FW_DIR="bin/targets/airoha/an7581"
          if [ -d "$FW_DIR" ]; then
            cp $FW_DIR/*.bin $FW_DIR/*.img $FW_DIR/sha256sums artifacts/ 2>/dev/null || true
            cd artifacts && sha256sum * > checksums.txt 2>/dev/null || true
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-24.10-nokia-xg140gmd
          path: openwrt/artifacts/
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            openwrt/logs/
            openwrt/.config
          retention-days: 7
