name: Build OpenWrt for AN7581 with ImmortalWrt Feeds

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  # 仅保留分支名，不再需要完整 URL
  REPO_BRANCH: openwrt-24.10-airoha-an7581-stable
  FEEDS_CONF: |
    src-git immortalwrt_core https://github.com/immortalwrt/immortalwrt.git;openwrt-24.10
    src-git immortalwrt_base https://github.com/immortalwrt/packages.git;openwrt-24.10
    src-git immortalwrt_luci https://github.com/immortalwrt/luci.git;openwrt-24.10
    src-git immortalwrt_routing https://github.com/openwrt/routing.git;openwrt-24.10
    src-git immortalwrt_telephony https://github.com/openwrt/telephony.git;openwrt-24.10

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout your config & custom.sh
        uses: actions/checkout@v4
        with:
          path: my-repo

      - name: Checkout OpenWrt (with AN7581 patches)
        uses: actions/checkout@v4
        with:
          repository: Ansuel/openwrt          # ✅ 修正：使用 owner/repo 格式
          ref: ${{ env.REPO_BRANCH }}
          path: openwrt

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git subversion libssl-dev gettext \
            zlib1g-dev unzip python3 python3-distutils python3-pip python3-setuptools rsync wget \
            file ecj fastjar libz-dev libelf-dev libprotobuf-dev protobuf-compiler \
            liblzma-dev swig device-tree-compiler qemu-utils bc bzip2 flex cpio time

      - name: Replace feeds with ImmortalWrt
        working-directory: openwrt
        run: |
          echo "${{ env.FEEDS_CONF }}" > feeds.conf.default
          cat feeds.conf.default

      - name: Update and install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy custom .config file
        working-directory: openwrt
        run: |
          cp "../my-repo/config/.config" .config
          echo "✅ .config loaded from config/ directory."

      - name: Run custom.sh to inject network, password, model
        working-directory: openwrt
        run: |
          chmod +x "../my-repo/custom.sh"
          "../my-repo/custom.sh" "$PWD"

      - name: Ensure AN7581 target (safety)
        working-directory: openwrt
        run: |
          if ! grep -q "CONFIG_TARGET_airoha_an7581" .config; then
            echo "CONFIG_TARGET_airoha=y" >> .config
            echo "CONFIG_TARGET_airoha_an7581=y" >> .config
          fi
          make defconfig

      - name: Download all sources
        working-directory: openwrt
        run: make download -j$(nproc)

      - name: Build firmware (save full log)
        working-directory: openwrt
        run: |
          make -j$(nproc) V=s 2>&1 | tee ../build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ Build failed, but full log is saved."
            exit 1
          fi

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: openwrt/build.log
          retention-days: 7

      - name: Collect artifacts
        working-directory: openwrt
        run: |
          mkdir -p ../artifacts
          find bin/targets -type f \( -name "*.bin" -o -name "*.itb" -o -name "*.img" -o -name "*.tar.gz" \) -exec cp {} ../artifacts/ \;
          cp .config ../artifacts/build.config
          cp ../my-repo/custom.sh ../artifacts/ 2>/dev/null || true
          cp ../build.log ../artifacts/ 2>/dev/null || true

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-an7581-immortalwrt
          path: artifacts/
          retention-days: 7
